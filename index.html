<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<title>Notes</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    color-scheme: light dark;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;

    background-color: #fff;
    --elevated: #fff;
    --link: #0066cc;
    --text: #161616;
    --outline: #007aff;

    @media (prefers-color-scheme: dark) {
      background-color: #000;
      --elevated: #121212;
      --link: #58a6ff;
      --text: #fff;
    }
  }

  body {
    color: var(--text);
  }

  a {
    color: var(--link);
    text-decoration: underline;
    text-underline-offset: 4px;
    text-decoration-thickness: 1px;
  }

  article {
    outline: none;
    padding: 18px max(18px, calc(50vw - 400px));
    width: 100%;
    min-height: 100dvh;
    font: 18px / 1.5 system-ui;
    tab-size: 4;
    white-space: pre-wrap;
    text-wrap-style: stable;
    overflow-wrap: break-word;
  }

  .md-h1,
  .md-h2,
  .md-h3,
  .md-h4,
  .md-h5,
  .md-h6 {
    font-weight: 700;
  }

  .md-h1 {
    font-size: 2em;
  }

  .md-h2 {
    font-size: 1.5em;
  }

  .md-h3 {
    font-size: 1.25em;
  }

  .md-h4 {
    font-size: 1.1em;
  }

  .md-h5 {
    font-size: 1em;
  }

  .md-h6 {
    font-size: 0.9em;
  }

  .md-code {
    font-family: monospace;
  }

  .md-codeblock {
    font-family: monospace;
  }

  .md-listitem {
    display: grid;
    grid-template-columns: max-content minmax(0, 1fr);
    column-gap: 0.55em;
    align-items: start;
    padding-left: calc(var(--list-level, 0) * 2.1em);
  }

  .md-listindent {
    font-size: 0;
    line-height: 0;
    grid-column: 1;
    grid-row: 1;
  }

  .md-listmarker {
    white-space: pre;
    min-width: 1.6em;
    text-align: right;
    padding-right: 0.05em;
    grid-column: 1;
    grid-row: 1;
  }

  .md-listitem[data-empty="true"] .md-listmarker {
    opacity: 0.18;
  }

  .md-listcontent {
    min-width: 0;
    white-space: pre-wrap;
    grid-column: 2;
    grid-row: 1;
  }

  .md-bold {
    font-weight: bold;
  }

  .md-strike {
    text-decoration: line-through;
  }

  .md-italic {
    font-style: italic;
  }

  .md-underline {
    text-decoration: underline;
    text-underline-offset: auto;
    text-decoration-thickness: auto;
  }

  .md-url {
    cursor: pointer;
  }

  /* md-link-source is the raw [text](url) markdown kept as plain
     text in the editor (not rendered as <a> so the URL isn't lost
     on save). Style it subtly so the user can distinguish it from
     regular text, but it doesn't look like a clickable link. */
  .md-link-source {
    color: var(--link);
  }

  #button {
    -webkit-tap-highlight-color: transparent;
    background-color: #3a3a3c;
    border-radius: 50%;
    border: none;
    bottom: 15px;
    box-shadow: 0 3px 5px -1px rgba(0, 0, 0, 0.2), 0 6px 10px 0 rgba(0, 0, 0, 0.14), 0 1px 18px 0 rgba(0, 0, 0, .12);
    color: #fff;
    cursor: pointer;
    display: grid;
    font-weight: 600;
    width: 46px;
    height: 46px;
    outline: none;
    overflow: hidden;
    padding: 0;
    place-items: center;
    position: fixed;
    right: 15px;
    text-decoration: none;
    touch-action: manipulation;
    transition: background-color .3s ease-out;
    user-select: none;
    z-index: 1;
  }

  @media (hover) {
    #button:hover {
      color: #fff;
      background-color: #545456;
      box-shadow: 0 5px 5px -3px rgba(0, 0, 0, 0.2), 0 8px 10px 1px rgba(0, 0, 0, 0.14), 0 3px 14px 2px rgba(0, 0, 0, .12);
    }
  }

  #button:focus-visible {
    outline: 2px solid var(--outline);
    outline-offset: 2px;
  }

  span.ripple {
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    animation: ripple 600ms linear;
    background-color: rgba(255, 255, 255, 0.7);
  }

  @keyframes ripple {
    to {
      transform: scale(4);
      opacity: 0;
    }
  }

  #menu {
    visibility: hidden;
    transform: scale(0.9) translateY(20px);
    transition: all 100ms cubic-bezier(0.4, 0, 0.2, 1) 0ms;
    opacity: 0;
    display: flex;
    flex-direction: column;
    width: 220px;
    position: fixed;
    right: 16px;
    bottom: 77px;
    box-shadow: 0 19px 38px rgba(0, 0, 0, 0.10), 0 15px 12px rgba(0, 0, 0, 0.05);
    background: var(--elevated);
    backdrop-filter: blur(10px);
    border-radius: 10px;
    z-index: 2;
  }

  #menu.visible {
    opacity: 1;
    transform: scale(1) translateY(0);
    visibility: visible;
  }

  #menu .item,
  #menu button.item {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    text-decoration: none;
    text-align: left;
    padding: 10px 14px;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    outline: none;
    border: none;
    touch-action: manipulation;
    font: 16px / 1.5 system-ui;
    color: var(--text);
    background: transparent;
    width: 100%;
  }

  #menu .recent-section {
    padding-top: 6px;
    border-top: 1px solid rgba(127, 127, 127, 0.16);
  }

  #menu .recent-label {
    padding: 10px 14px 6px;
    font: 12px / 1.4 system-ui;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.6;
  }

  #menu .recent-docs {
    display: flex;
    flex-direction: column;
    max-height: 220px;
    overflow: auto;
  }

  #menu .recent-doc {
    display: block;
    text-align: left;
  }

  #menu .recent-title {
    display: block;
    width: 100%;
    white-space: nowrap;
    text-overflow: ellipsis;
    overflow: hidden;
    font-weight: 600;
  }

  #menu .recent-meta {
    font: 12px / 1.4 system-ui;
    opacity: 0.65;
  }

  #menu .selector-section {
    padding-top: 6px;
    border-top: 1px solid rgba(127, 127, 127, 0.16);
  }

  /* Doc browser dialog overlay */
  #doc-dialog-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    z-index: 100;
    place-items: center;
  }

  #doc-dialog-overlay.visible {
    display: grid;
  }

  #doc-dialog {
    width: min(90vw, 420px);
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    background: var(--elevated);
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    overflow: hidden;
  }

  #doc-dialog-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    font: 600 16px / 1.3 system-ui;
    color: var(--text);
  }

  #doc-dialog-close {
    width: 28px;
    height: 28px;
    border: none;
    background: rgba(127, 127, 127, 0.15);
    border-radius: 50%;
    color: var(--text);
    cursor: pointer;
    display: grid;
    place-items: center;
    font-size: 16px;
    line-height: 1;
    padding: 0;
  }

  #doc-dialog-close:hover {
    background: rgba(127, 127, 127, 0.3);
  }

  #doc-dialog-search {
    margin: 0 16px 8px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid rgba(127, 127, 127, 0.22);
    background: transparent;
    color: var(--text);
    font: 15px / 1.4 system-ui;
    outline: none;
    width: calc(100% - 32px);
  }

  #doc-dialog-search:focus-visible {
    outline: 2px solid var(--outline);
    outline-offset: 2px;
  }

  #doc-dialog-search::placeholder {
    opacity: 0.4;
  }

  #doc-dialog-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 8px;
  }

  #doc-dialog-list .doc-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    border: none;
    background: transparent;
    width: 100%;n    text-align: left;
    font: 15px / 1.4 system-ui;
  }

  #doc-dialog-list .doc-item:hover {
    background: rgba(0, 0, 0, 0.06);
  }

  @media (prefers-color-scheme: dark) {
    #doc-dialog-list .doc-item:hover {
      background: #353535;
    }
  }

  #doc-dialog-list .doc-item[data-current="true"] {
    background: rgba(0, 122, 255, 0.1);
  }

  #doc-dialog-list .doc-item-title {
    font-weight: 600;
    white-space: nowrap;
    text-overflow: ellipsis;
    overflow: hidden;
  }

  #doc-dialog-list .doc-item-meta {
    font: 12px / 1.3 system-ui;
    opacity: 0.5;
  }

  #doc-dialog-list .doc-item-preview {
    font: 13px / 1.4 system-ui;
    opacity: 0.45;
    white-space: nowrap;
    text-overflow: ellipsis;
    overflow: hidden;
    margin-top: 1px;
  }

  #doc-dialog-empty {
    padding: 24px 16px;
    text-align: center;
    opacity: 0.5;
    font: 15px / 1.4 system-ui;
    color: var(--text);
  }

  #menu .item:hover {
    background-color: rgba(0, 0, 0, 0.04);
    @media (prefers-color-scheme: dark) {
      background-color: #353535;
    }
  }

  #menu .item:focus-within {
    outline: 2px solid var(--outline);
  }

  #menu .item:first-child {
    border-top-left-radius: 10px;
    border-top-right-radius: 10px;
  }

  #menu .item:last-child {
    border-bottom-left-radius: 10px;
    border-bottom-right-radius: 10px;
  }

  #notification {
    visibility: hidden;
    transform: translateY(-30px);
    transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1) 0ms;
    opacity: 0;

    display: flex;
    flex-direction: column;

    position: fixed;
    right: 17px;
    top: 17px;

    background: var(--elevated);
    color: var(--text);
    border-radius: 10px;
    box-shadow: 0 19px 38px rgba(0, 0, 0, 0.10), 0 15px 12px rgba(0, 0, 0, 0.05);
    font: 16px / 1.4 system-ui;
    z-index: 2;
    padding: 10px 20px;
  }

  #notification.visible {
    opacity: 1;
    transform: translateY(0);
    visibility: visible;
  }

  @media print {
    .noprint {
      visibility: hidden !important;
    }
  }
</style>
<article contenteditable="plaintext-only" spellcheck autofocus aria-label="Note editor"></article>
<button id="button" class="noprint" aria-label="Menu">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
       stroke="currentColor"
       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="1"></circle>
    <circle cx="12" cy="5" r="1"></circle>
    <circle cx="12" cy="19" r="1"></circle>
  </svg>
</button>
<div id="menu" class="noprint" role="menu">
  <button class="item" id="new-document" type="button" role="menuitem" aria-label="New document">
    <svg aria-hidden="true" focusable="false" width="22" height="22">
      <use xlink:href="#icon-plus"></use>
    </svg>
    New document
  </button>
  <button class="item" id="delete-document" type="button" role="menuitem" aria-label="Delete document">
    <svg aria-hidden="true" focusable="false" width="22" height="22">
      <use xlink:href="#icon-trash"></use>
    </svg>
    Delete document
  </button>
  <div class="recent-section">
    <div class="recent-label">Recent docs</div>
    <div id="recent-docs" class="recent-docs" role="none"></div>
  </div>
  <div class="selector-section">
    <button class="item" id="browse-docs" type="button" role="menuitem" aria-label="Browse documents">
      <svg aria-hidden="true" focusable="false" width="22" height="22">
        <use xlink:href="#icon-folder"></use>
      </svg>
      More docs…
    </button>
  </div>
  <button class="item" id="copy-rendered" type="button" role="menuitem" aria-label="Copy rendered">
    <svg aria-hidden="true" focusable="false" width="22" height="22">
      <use xlink:href="#icon-copy"></use>
    </svg>
    Copy rendered
  </button>
  <a class="item" id="save-as-html" href="" role="menuitem" aria-label="Save as HTML">
    <svg aria-hidden="true" focusable="false" width="22" height="22">
      <use xlink:href="#icon-empty"></use>
    </svg>
    Save as HTML
  </a>
  <a class="item" id="save-as-text" href="" role="menuitem" aria-label="Save as text">
    <svg aria-hidden="true" focusable="false" width="22" height="22">
      <use xlink:href="#icon-empty"></use>
    </svg>
    Save as TEXT
  </a>
  <button class="item" id="link-folder" type="button" role="menuitem" aria-label="Link folder">
    <svg aria-hidden="true" focusable="false" width="22" height="22">
      <use xlink:href="#icon-folder"></use>
    </svg>
    <span id="link-folder-label">Link folder…</span>
  </button>
  <button class="item" id="refresh-folder" type="button" role="menuitem" aria-label="Refresh from folder">
    <svg aria-hidden="true" focusable="false" width="22" height="22">
      <use xlink:href="#icon-refresh"></use>
    </svg>
    Refresh from folder
  </button>
</div>
<div id="doc-dialog-overlay" class="noprint">
  <div id="doc-dialog" role="dialog" aria-label="Browse documents">
    <div id="doc-dialog-header">
      <span>All documents</span>
      <button id="doc-dialog-close" type="button" aria-label="Close">✕</button>
    </div>
    <input id="doc-dialog-search" type="text" placeholder="Search docs…" autocomplete="off" aria-label="Search documents">
    <div id="doc-dialog-list"></div>
  </div>
</div>
<div id="notification" class="noprint" role="status" aria-live="polite"></div>
<script>
  initUI()

  const article = document.querySelector('article')
  const menu = document.querySelector('#menu')
  const editor = new Editor(article, parseMarkdown)
  const docsKey = 'textarea-docs'
  const currentDocKey = 'textarea-current-doc-id'
  let docs = loadDocs()
  let currentDocId = localStorage.getItem(currentDocKey)

  // Grab folder permission on the first user gesture after the folder
  // is linked. After permission is granted once, queryPermission()
  // returns 'granted' for the rest of the session, so the debounced
  // save() -> syncDoc() path works without needing a gesture.
  //
  // We keep listening until the folder is linked AND we've made one
  // attempt to grab permission. Without this, fast typing would call
  // ensureFolderPermission() on every keystroke, flooding the event
  // loop with overlapping async queryPermission() calls.
  let _permissionGrabbed = false
  function grabPermissionOnGesture() {
    if (_permissionGrabbed) return
    if (!linkedFolderHandle) return  // not linked yet
    _permissionGrabbed = true
    ensureFolderPermission().then(granted => {
      if (granted) console.log('[folder sync] permission granted')
    })
    // Remove ourselves once we've made the attempt.
    article.removeEventListener('input', grabPermissionOnGesture)
    document.removeEventListener('pointerdown', grabPermissionOnGesture)
  }
  article.addEventListener('input', grabPermissionOnGesture)
  document.addEventListener('pointerdown', grabPermissionOnGesture)
  // Debounced save: wrap in arrow function so debounce doesn't pass
  // the Event object to save(), which would be treated as
  // skipFileSync=true and skip folder sync.
  article.addEventListener('input', debounce(500, () => save()))
  article.addEventListener('blur', save)
  article.addEventListener('click', event => {
    if (event.target.tagName === 'A') window.open(event.target.getAttribute('href'), '_blank')
  })
  addEventListener('DOMContentLoaded', load)
  addEventListener('load', () => new MutationObserver(save).observe(article, {attributeFilter: ['style']}))

  addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.code === 'KeyS') {
      e.preventDefault()
      downloadHTML()
    }
  })

  // Flush save on page unload. Without this, edits made in the last
  // 500ms (the debounce window) are lost on reload / tab close.
  // skipFileSync=true because the async file write may complete after
  // the user has switched to an external editor (race condition).
  addEventListener('pagehide', () => save(true))
  addEventListener('beforeunload', () => save(true))
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') {
      save(true)
    } else if (document.visibilityState === 'visible') {
      // Tab refocused - an AI agent / external tool may have edited
      // files in the linked folder while we were away. Pull in changes.
      syncFromFolder()
    }
  })

  // Periodic background sync: every 2 seconds while the page is
  // visible, check the folder for external changes. This catches the
  // case where the user has the browser and an external editor side
  // by side (no visibilitychange fires). Cheap because syncFromFolder
  // only reads files and compares hashes - no writes unless changes
  // are found.
  setInterval(() => {
    if (document.visibilityState === 'visible' && linkedFolderHandle) {
      syncFromFolder(false)
    }
  }, 2000)

  async function load() {
    docs = loadDocs()
    migrateOldSyncMaps()
    if (!Object.keys(docs).length) {
      createDoc({content: '', style: null}, false)
    }
    const doc = getActiveDoc()
    applyDoc(doc)
    renderRecentDocs()
    renderDocSelector()
    restoreLinkedFolder()
  }

  function getActiveDoc() {
    if (currentDocId && docs[currentDocId]) return docs[currentDocId]
    const latest = Object.values(docs).sort((a, b) => b.updatedAt - a.updatedAt)[0]
    if (latest) {
      currentDocId = latest.id
      persistCurrentDocId()
      return latest
    }
    const doc = createDoc({content: '', style: null}, false)
    currentDocId = doc.id
    persistCurrentDocId()
    return doc
  }

  function applyDoc(doc) {
    editor.set(doc.content ?? '')
    if (doc.style) article.setAttribute('style', doc.style)
    else article.removeAttribute('style')
    updateTitle()
  }

  // Save the current doc to localStorage. If skipFileSync is false
  // (default), also sync to the linked folder. Unload handlers pass
  // skipFileSync=true because the async file write may complete after
  // the user has switched to an external editor (race condition).
  function save(skipFileSync = false) {
    if (!currentDocId || !docs[currentDocId]) {
      const doc = createDoc({content: '', style: null}, false)
      currentDocId = doc.id
      persistCurrentDocId()
    }

    const style = article.getAttribute('style')
    const content = article.textContent || ''
    const doc = docs[currentDocId]
    doc.content = content
    doc.style = style
    doc.title = extractTitle(content) || doc.title
    doc.updatedAt = Date.now()
    docs[currentDocId] = doc
    persistDocs()
    updateTitle()
    renderRecentDocs()
    renderDocSelector()

    if (!skipFileSync) syncDoc(doc)
  }

  function openDoc(id) {
    if (!docs[id]) return
    if (currentDocId !== id) save()
    currentDocId = id
    persistCurrentDocId()
    applyDoc(docs[id])
    renderRecentDocs()
    renderDocSelector()
    menu.classList.remove('visible')
  }

  function newDoc() {
    save()
    const doc = createDoc({content: '', style: null})
    currentDocId = doc.id
    persistCurrentDocId()
    applyDoc(doc)
    renderRecentDocs()
    renderDocSelector()
    menu.classList.remove('visible')
  }

  function deleteDoc() {
    if (!currentDocId || !docs[currentDocId]) {
      menu.classList.remove('visible')
      return
    }
    const doc = docs[currentDocId]
    const title = getDocTitle(doc)
    const shortTitle = title.length > 60 ? title.slice(0, 57) + '...' : title
    if (!confirm('Delete "' + shortTitle + '"?\n\nThis cannot be undone.')) {
      return
    }

    // Delete the corresponding .md file from the linked folder.
    deleteDocFile(doc)

    delete docs[currentDocId]
    persistDocs()

    const remaining = sortedDocs()
    if (remaining.length) {
      currentDocId = remaining[0].id
      persistCurrentDocId()
      applyDoc(remaining[0])
    } else {
      const fresh = createDoc({content: '', style: null}, false)
      currentDocId = fresh.id
      persistCurrentDocId()
      applyDoc(fresh)
    }

    renderRecentDocs()
    renderDocSelector()
    menu.classList.remove('visible')
    notify('Document deleted')
  }

  function renderRecentDocs() {
    const container = document.querySelector('#recent-docs')
    if (!container) return

    const items = sortedDocs().slice(0, 5)

    container.replaceChildren()

    if (!items.length) {
      const empty = document.createElement('div')
      empty.className = 'item recent-doc'
      empty.style.cursor = 'default'
      empty.style.opacity = '0.65'
      empty.textContent = 'No saved docs yet'
      container.appendChild(empty)
      return
    }

    for (const doc of items) {
      const button = document.createElement('button')
      button.type = 'button'
      button.className = 'item recent-doc'
      button.setAttribute('role', 'menuitem')
      if (doc.id === currentDocId) button.setAttribute('aria-current', 'true')

      const title = document.createElement('span')
      title.className = 'recent-title'
      title.textContent = getDocTitle(doc)

      const meta = document.createElement('span')
      meta.className = 'recent-meta'
      meta.textContent = formatUpdatedAt(doc.updatedAt)

      button.append(title, meta)
      button.addEventListener('click', () => openDoc(doc.id))
      container.appendChild(button)
    }
  }

  function renderDocSelector() {
    // No-op — replaced by doc dialog
  }

  function openDocDialog() {
    const overlay = document.querySelector('#doc-dialog-overlay')
    const search = document.querySelector('#doc-dialog-search')
    overlay.classList.add('visible')
    search.value = ''
    renderDocDialogList()
    setTimeout(() => search.focus(), 50)
  }

  function closeDocDialog() {
    const overlay = document.querySelector('#doc-dialog-overlay')
    overlay.classList.remove('visible')
  }

  function renderDocDialogList(filter = '') {
    const list = document.querySelector('#doc-dialog-list')
    const lowerFilter = filter.toLowerCase()
    list.innerHTML = ''
    let count = 0

    for (const doc of sortedDocs()) {
      const title = getDocTitle(doc)
      const preview = (doc.content || '').replace(/\n+/g, ' ').slice(0, 80)
      if (lowerFilter && !title.toLowerCase().includes(lowerFilter) && !preview.toLowerCase().includes(lowerFilter)) continue

      const time = formatUpdatedAt(doc.updatedAt)

      const btn = document.createElement('button')
      btn.className = 'doc-item'
      btn.type = 'button'
      btn.dataset.id = doc.id
      if (doc.id === currentDocId) btn.dataset.current = 'true'

      btn.innerHTML =
        '<span class="doc-item-title">' + escapeHtml(title) + '</span>' +
        '<span class="doc-item-meta">' + escapeHtml(time) + '</span>' +
        (preview ? '<span class="doc-item-preview">' + escapeHtml(preview) + '</span>' : '')

      btn.addEventListener('click', () => {
        closeDocDialog()
        openDoc(doc.id)
      })

      list.appendChild(btn)
      count++
    }

    if (count === 0) {
      const empty = document.createElement('div')
      empty.id = 'doc-dialog-empty'
      empty.textContent = lowerFilter ? 'No matching documents' : 'No documents yet'
      list.appendChild(empty)
    }
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;')
  }

  function sortedDocs() {
    return Object.values(docs).sort((a, b) => b.updatedAt - a.updatedAt)
  }

  function getDocTitle(doc) {
    return extractTitle(doc?.content || '') || doc?.title || 'Untitled'
  }

  function extractTitle(content) {
    const firstLine = content
      .split('\n')
      .map(line => line.trim())
      .find(Boolean)

    if (!firstLine) return null

    const cleaned = firstLine
      .replace(/^#{1,6}\s+/, '')
      .replace(/^[-*+]\s+/, '')
      .replace(/^\d+[.)]\s+/, '')
      .replace(/^>\s+/, '')
      .trim()

    return (cleaned || firstLine).slice(0, 60)
  }

  function formatUpdatedAt(timestamp) {
    try {
      return new Intl.DateTimeFormat(undefined, {
        month: 'short',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
      }).format(timestamp)
    } catch (e) {
      return new Date(timestamp).toLocaleString()
    }
  }

  function loadDocs() {
    try {
      const raw = localStorage.getItem(docsKey)
      const parsed = raw ? JSON.parse(raw) : {}
      if (!parsed || typeof parsed !== 'object') return {}

      const normalized = {}
      for (const [id, doc] of Object.entries(parsed)) {
        if (!doc || typeof doc !== 'object') continue
        const content = typeof doc.content === 'string' ? doc.content : ''
        normalized[id] = {
          id: doc.id || id,
          title: doc.title || extractTitle(content),
          content,
          style: typeof doc.style === 'string' ? doc.style : null,
          updatedAt: Number(doc.updatedAt) || Date.now(),
          filename: typeof doc.filename === 'string' ? doc.filename : null,
          fileHash: typeof doc.fileHash === 'string' ? doc.fileHash : null,
        }
      }
      return normalized
    } catch (e) {
      return {}
    }
  }

  function persistDocs() {
    try {
      localStorage.setItem(docsKey, JSON.stringify(docs))
    } catch (e) {
      // localStorage quota exceeded (typically 5MB) or storage
      // disabled. Surface this so the user knows their edits aren't
      // being saved - silent failure here causes real data loss.
      console.error('persistDocs failed:', e)
      notify('Save failed - storage full. Use "Save as HTML" to back up.')
    }
  }

  // Module-level notify so persistDocs (which is at module scope) can
  // surface errors. initUI also has its own local notify that does
  // the same thing - either one updates the same #notification element.
  function notify(message) {
    const el = document.querySelector('#notification')
    if (!el) return
    el.classList.add('visible')
    el.textContent = message
    setTimeout(() => el.classList.remove('visible'), 4e3)
  }

  function persistCurrentDocId() {
    try {
      localStorage.setItem(currentDocKey, currentDocId ?? '')
    } catch (e) {
    }
  }

  function createDoc(initial = {}, select = true) {
    let title = extractTitle(initial.content || '')
    if (!title) {
      // Generate "New Document N" where N is the next unused number.
      let n = 1
      const existing = new Set(Object.values(docs).map(d => d.title))
      while (existing.has('New Document ' + n)) n++
      title = 'New Document ' + n
    }
    const doc = {
      id: newDocId(),
      title: title,
      content: initial.content || '',
      style: initial.style ?? null,
      updatedAt: Date.now(),
      filename: initial.filename ?? null,
      fileHash: initial.fileHash ?? null,
    }

    docs[doc.id] = doc
    persistDocs()
    if (select) {
      currentDocId = doc.id
      persistCurrentDocId()
    }
    return doc
  }

  // ---------------------------------------------------------------------------
  // Folder sync via the File System Access API.
  //
  // Lets AI agents / external tools read and write the user's notes as
  // plain .md files in a real folder on disk. The user picks a folder
  // once; the handle is persisted in IndexedDB across reloads. From
  // then on:
  //   - save() writes the current doc to <folder>/<slug>.md
  //   - On page load + tab refocus, syncFromFolder() pulls in any
  //     external changes (file wins on conflict).
  //
  // Per-doc sync state (filename, content hash) is stored ON the doc
  // object itself (doc.filename, doc.fileHash) rather than in parallel
  // maps. This keeps everything in one place and persists naturally
  // via persistDocs().
  //
  // Conflict policy: if the file's content hash differs from
  // doc.fileHash, the file was edited externally and file wins. The
  // one exception: if the file is empty but the doc has content, we
  // treat that as corruption (not an intentional edit) and restore
  // the file from the doc.
  // ---------------------------------------------------------------------------

  let linkedFolderHandle = null
  const folderSyncDbName = 'notes-folder-sync'
  const folderSyncStore = 'handles'
  const folderSyncKey = 'linked-folder'

  // Check whether folder sync is usable. Returns null if yes, or a
  // human-readable reason string if no.
  function folderSyncBlocker() {
    if (typeof window.showDirectoryPicker !== 'function') {
      const isBrave = navigator.brave && typeof navigator.brave.isBrave === 'function'
        || /brave/i.test(navigator.userAgent)
      if (isBrave) {
        return 'Brave disables the File System Access API by default. Enable it: go to brave://flags, search "File System Access API", set to Enabled, relaunch. (Or use Chrome/Edge, or run via http://localhost.)'
      }
      return 'Folder sync needs Chrome, Edge, or Brave. Firefox/Safari do not support it.'
    }
    if (!window.isSecureContext) {
      if (location.protocol === 'file:') {
        return 'Folder sync needs a secure context. Serve via http://localhost instead of file:// - e.g. run "python3 -m http.server" in the folder and open http://localhost:8000/notes.html'
      }
      return 'Folder sync needs HTTPS or http://localhost. Current origin is not secure: ' + location.origin
    }
    return null
  }

  function supportsFolderSync() {
    return folderSyncBlocker() === null
  }

  // --- IndexedDB: persist the folder handle across reloads ----------

  function openFolderSyncDb() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(folderSyncDbName, 1)
      req.onupgradeneeded = () => req.result.createObjectStore(folderSyncStore)
      req.onsuccess = () => resolve(req.result)
      req.onerror = () => reject(req.error)
    })
  }

  async function persistFolderHandle(handle) {
    try {
      const db = await openFolderSyncDb()
      const tx = db.transaction(folderSyncStore, 'readwrite')
      tx.objectStore(folderSyncStore).put(handle, folderSyncKey)
      await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = () => rej(tx.error) })
      db.close()
    } catch (e) { console.error('persistFolderHandle failed:', e) }
  }

  async function loadPersistedFolderHandle() {
    try {
      const db = await openFolderSyncDb()
      const tx = db.transaction(folderSyncStore, 'readonly')
      const req = tx.objectStore(folderSyncStore).get(folderSyncKey)
      const handle = await new Promise((res, rej) => {
        req.onsuccess = () => res(req.result)
        req.onerror = () => rej(req.error)
      })
      db.close()
      return handle || null
    } catch (e) { return null }
  }

  async function clearPersistedFolderHandle() {
    try {
      const db = await openFolderSyncDb()
      const tx = db.transaction(folderSyncStore, 'readwrite')
      tx.objectStore(folderSyncStore).delete(folderSyncKey)
      await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = () => rej(tx.error) })
      db.close()
    } catch (e) { /* ignore */ }
  }

  // --- Helpers ------------------------------------------------------

  // SHA-256 of text. Used for change detection, not security.
  async function hashContent(text) {
    try {
      const data = new TextEncoder().encode(text || '')
      const buf = await crypto.subtle.digest('SHA-256', data)
      return Array.from(new Uint8Array(buf))
        .map(b => b.toString(16).padStart(2, '0')).join('')
    } catch (e) {
      // Fallback non-crypto hash - good enough for change detection.
      let h = 0
      const s = text || ''
      for (let i = 0; i < s.length; i++) {
        h = ((h << 5) - h) + s.charCodeAt(i)
        h |= 0
      }
      return 'fallback-' + h
    }
  }

  // Convert a doc title to a filesystem-safe .md filename.
  // "First Alert - Process" -> "First-Alert-Process-abc123.md"
  // The 6-char doc-id suffix prevents collisions between same-titled docs.
  function slugifyTitle(title, docId) {
    const base = (title || 'untitled')
      .trim()
      .replace(/[<>:"/\\|?*\x00-\x1f]/g, '')
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '')
      || 'untitled'
    return base + '-' + (docId || '').slice(0, 6) + '.md'
  }

  // Ensure we have readwrite permission on the folder. If called from
  // a user gesture (input, click), can call requestPermission() to
  // prompt. If called from a timer (debounced save), will wait for
  // any in-flight permission request started by a user gesture.
  // Returns true if granted.
  let _permissionPromise = null
  async function ensureFolderPermission() {
    if (!linkedFolderHandle) return false
    // If a permission request is already in flight (started by a
    // user gesture), wait for it instead of starting a competing one.
    if (_permissionPromise) return _permissionPromise
    try {
      const perm = await linkedFolderHandle.queryPermission({mode: 'readwrite'})
      if (perm === 'granted') return true
      // Permission is 'prompt' - try to request it. This only works
      // from within a user gesture; from a timer it will return
      // 'prompt' again (no error, just no grant).
      _permissionPromise = (async () => {
        try {
          const requested = await linkedFolderHandle.requestPermission({mode: 'readwrite'})
          if (requested === 'granted') return true
          return false
        } finally {
          _permissionPromise = null
        }
      })()
      const granted = await _permissionPromise
      if (!granted) {
        // Only notify if we're likely in a user gesture context. From
        // a timer, requesting silently fails - no point notifying.
        // We can't reliably detect this, so skip the notification
        // and let the user-gesture path handle prompting.
      }
      return granted
    } catch (e) {
      console.error('[folder sync] ensureFolderPermission failed:', e)
      return false
    }
  }

  // Check permission without prompting (safe to call outside a gesture).
  async function hasFolderPermission() {
    if (!linkedFolderHandle) return false
    try {
      return await linkedFolderHandle.queryPermission({mode: 'readwrite'}) === 'granted'
    } catch (e) { return false }
  }

  // --- Core sync: one doc <-> one file ------------------------------

  // Sync a single doc to/from its file. Called from save() (within a
  // user gesture) and from syncFromFolder(). The doc's filename and
  // last-known content hash are stored on the doc itself.
  //
  // Logic:
  //   1. Compute the filename from the doc's title.
  //   2. If the filename changed since last sync, delete the old file.
  //   3. Read the current file content (if it exists - no create).
  //   4. Hash the file content and compare to doc.fileHash:
  //      - Match: file unchanged since we last touched it. Write the
  //        doc to the file (in case the doc has new edits).
  //      - Differ: file was edited externally. File wins - update the
  //        doc from the file. EXCEPT: if the file is empty but the doc
  //        has content, treat as corruption and write the doc to the
  //        file instead.
  //      - File doesn't exist: just write the doc to a new file.
  //   5. Never write empty content (guard against corrupted state).
  async function syncDoc(doc) {
    if (!linkedFolderHandle || !doc) return
    if (!(await ensureFolderPermission())) return
    if (!(doc.content || '').trim()) return

    const newFilename = slugifyTitle(doc.title || extractTitle(doc.content), doc.id)

    // Handle rename: delete the old file if the slug changed.
    if (doc.filename && doc.filename !== newFilename) {
      try { await linkedFolderHandle.removeEntry(doc.filename) }
      catch (e) { /* old file may not exist */ }
      doc.fileHash = null
    }

    // Read the existing file WITHOUT creating it. If it doesn't exist,
    // there's no conflict possible - we'll create it on write.
    let fileText = null
    try {
      const handle = await linkedFolderHandle.getFileHandle(newFilename)
      const file = await handle.getFile()
      fileText = await file.text()
    } catch (e) {
      // File doesn't exist - that's fine.
    }

    if (fileText !== null) {
      const fileHash = await hashContent(fileText)
      if (fileHash !== doc.fileHash) {
        // File changed since we last knew it.
        const docContent = doc.content || ''
        if (fileText !== docContent) {
          // Empty file + non-empty doc = corruption, not an edit.
          // Restore the file from the doc.
          if (!fileText.trim() && docContent.trim()) {
            console.log(`[folder sync] ${newFilename} is empty but doc has content - restoring file`)
          } else {
            // Genuine external edit. File wins, but not if editor has unsaved edits.
            if (doc.id === currentDocId) {
              const editorContent = article.textContent || ''
              if (editorContent !== (doc.content || '')) {
                console.log(`[folder sync] ${newFilename} changed externally but editor has unsaved edits - skipping`)
                doc.fileHash = fileHash
                return
              }
            }
            console.log(`[folder sync] external edit in ${newFilename} - updating doc from file`)
            doc.content = fileText
            doc.title = extractTitle(fileText)
            doc.updatedAt = Date.now()
            doc.fileHash = fileHash
            doc.filename = newFilename
            docs[doc.id] = doc
            persistDocs()
            if (doc.id === currentDocId) applyDoc(doc)
            notify(`Updated from file: ${newFilename}`)
            return
          }
        }
        doc.fileHash = fileHash
      }
    }

    // Write the doc's content to the file.
    try {
      const fileHandle = await linkedFolderHandle.getFileHandle(newFilename, {create: true})
      const writable = await fileHandle.createWritable()
      await writable.write(doc.content || '')
      await writable.close()
      doc.filename = newFilename
      doc.fileHash = await hashContent(doc.content || '')
      persistDocs()
    } catch (e) {
      console.error('[folder sync] write failed for', doc.id, e)
      notify('Folder sync failed - check console')
    }
  }

  // --- Folder scan: pull in external changes ------------------------

  // Scan the linked folder for .md files and merge them into docs.
  // For each file:
  //   - If a doc has doc.filename === this file -> compare hashes,
  //     update doc if file changed (file wins, same corruption guard).
  //   - If no doc has this filename -> new file, create a doc from it.
  // Files with no corresponding doc mapping are imported as new docs.
  // Docs whose file was deleted from the folder are left alone (the
  // user might be mid-edit, or might have deleted the file by accident).
  //
  // userInitiated: true when called from a click (can request
  // permission). false for automatic triggers (only proceeds if
  // permission is already granted).
  async function syncFromFolder(userInitiated = false) {
    if (!linkedFolderHandle) return
    if (userInitiated) {
      if (!(await ensureFolderPermission())) return
    } else {
      if (!(await hasFolderPermission())) {
        console.log('[folder sync] skipping auto-sync - no permission')
        return
      }
    }

    let newCount = 0, updatedCount = 0

    try {
      for await (const entry of linkedFolderHandle.values()) {
        if (entry.kind !== 'file' || !entry.name.endsWith('.md')) continue
        const file = await entry.getFile()
        const text = await file.text()
        const fileHash = await hashContent(text)

        // Find doc by filename.
        let doc = null
        for (const d of Object.values(docs)) {
          if (d.filename === entry.name) { doc = d; break }
        }

        if (doc) {
          if (fileHash === doc.fileHash) continue  // no change
          // File changed. Same corruption guard as syncDoc.
          if (!text.trim() && (doc.content || '').trim()) {
            console.log(`[folder sync] ${entry.name} is empty but doc has content - restoring file`)
            try {
              const fh = await linkedFolderHandle.getFileHandle(entry.name, {create: true})
              const w = await fh.createWritable()
              await w.write(doc.content)
              await w.close()
              doc.fileHash = await hashContent(doc.content)
            } catch (e) { console.error('[folder sync] restore failed:', e) }
            continue
          }
          // File wins. But don't overwrite unsaved edits in the active doc.
          if (doc.id === currentDocId) {
            const editorContent = article.textContent || ''
            if (editorContent !== (doc.content || '')) {
              console.log(`[folder sync] ${entry.name} changed externally but editor has unsaved edits - skipping`)
              continue
            }
          }
          doc.content = text
          doc.title = extractTitle(text)
          doc.updatedAt = Date.now()
          doc.fileHash = fileHash
          updatedCount++
          if (doc.id === currentDocId) applyDoc(doc)
        } else {
          // New file - create a doc from it. Skip empty files (they're
          // almost certainly not intentional notes).
          if (!text.trim()) continue
          doc = createDoc({content: text, style: null}, false)
          doc.filename = entry.name
          doc.fileHash = fileHash
          newCount++
        }
      }

      persistDocs()
      renderRecentDocs()
      renderDocSelector()

      console.log(`[folder sync] scan complete: ${newCount} new, ${updatedCount} updated`)
      if (newCount || updatedCount) {
        notify(`Synced from folder: ${newCount} new, ${updatedCount} updated`)
      }
    } catch (e) {
      console.error('[folder sync] scan failed:', e)
      notify('Folder refresh failed - check console')
    }
  }

  // Delete the file for a doc (called from deleteDoc). No-ops if the
  // doc has no filename or no folder is linked.
  async function deleteDocFile(doc) {
    if (!linkedFolderHandle || !doc || !doc.filename) return
    try { await linkedFolderHandle.removeEntry(doc.filename) }
    catch (e) { /* file may already be gone */ }
  }

  // --- Folder link / unlink / restore -------------------------------

  async function linkFolder() {
    const blocker = folderSyncBlocker()
    if (blocker) {
      notify(blocker)
      console.warn('[folder sync]', blocker)
      return
    }
    try {
      const handle = await window.showDirectoryPicker({mode: 'readwrite'})
      linkedFolderHandle = handle
      await persistFolderHandle(handle)
      updateLinkFolderLabel()
      notify('Folder linked: ' + handle.name)
      await syncFromFolder(true)
    } catch (e) {
      if (e.name === 'AbortError') return
      console.error('[folder sync] linkFolder failed:', e)
      notify('Could not link folder - see console')
    }
  }

  async function unlinkFolder() {
    linkedFolderHandle = null
    await clearPersistedFolderHandle()
    updateLinkFolderLabel()
    notify('Folder unlinked - files kept on disk')
  }

  function updateLinkFolderLabel() {
    const label = document.querySelector('#link-folder-label')
    if (!label) return
    label.textContent = linkedFolderHandle
      ? 'Unlink folder (' + linkedFolderHandle.name + ')'
      : 'Link folder…'
  }

  // On page load, restore the persisted folder handle. Always restore
  // the handle + label (so the UI shows linked state); only sync if
  // permission is already granted (requestPermission needs a gesture).
  async function restoreLinkedFolder() {
    if (!supportsFolderSync()) return
    const handle = await loadPersistedFolderHandle()
    if (!handle) return
    linkedFolderHandle = handle
    updateLinkFolderLabel()
    try {
      const perm = await handle.queryPermission({mode: 'readwrite'})
      console.log('[folder sync] restored handle, permission:', perm)
      if (perm === 'granted') {
        await syncFromFolder(false)
      } else {
        console.log('[folder sync] will request permission on next user action')
      }
    } catch (e) {
      console.error('[folder sync] restore failed:', e)
    }
  }

  // --- Migration: merge old parallel maps into docs -----------------

  // Previous versions stored filename/hash in separate localStorage
  // keys (notes-doc-filenames, notes-file-content-hash). Migrate those
  // into doc.filename / doc.fileHash on the docs themselves, then
  // delete the old keys. One-time - safe to call on every load.
  function migrateOldSyncMaps() {
    let oldFilenames = null, oldHashes = null
    try {
      const raw = localStorage.getItem('notes-doc-filenames')
      if (raw) oldFilenames = JSON.parse(raw)
    } catch (e) {}
    try {
      const raw = localStorage.getItem('notes-file-content-hash')
      if (raw) oldHashes = JSON.parse(raw)
    } catch (e) {}

    if (!oldFilenames && !oldHashes) return  // nothing to migrate

    let changed = false
    for (const doc of Object.values(docs)) {
      if (!doc.filename && oldFilenames && oldFilenames[doc.id]) {
        doc.filename = oldFilenames[doc.id]
        changed = true
      }
      if (doc.fileHash == null && oldHashes && oldHashes[doc.id]) {
        doc.fileHash = oldHashes[doc.id]
        changed = true
      }
    }
    if (changed) persistDocs()

    // Clean up old keys.
    try { localStorage.removeItem('notes-doc-filenames') } catch (e) {}
    try { localStorage.removeItem('notes-file-content-hash') } catch (e) {}
    try { localStorage.removeItem('notes-last-file-sync') } catch (e) {}
    if (changed) console.log('[folder sync] migrated old sync maps into docs')
  }

  function newDocId() {
    if (crypto?.randomUUID) return crypto.randomUUID()
    return `doc-${Date.now()}-${Math.random().toString(16).slice(2)}`
  }

  function updateTitle() {
    document.title = extractTitle(article.textContent || '') || (docs[currentDocId]?.title || 'Untitled')
  }

  function debounce(ms, fn) {
    let timer
    const d = (...args) => {
      clearTimeout(timer)
      timer = setTimeout(() => { timer = null; fn(...args) }, ms)
    }
    d.cancel = () => { clearTimeout(timer); timer = null }
    return d
  }

  async function downloadHTML() {
    updateTitle()
    // Build clean semantic HTML (real <ul>/<ol>/<li>, <a>, <h1>..<h6>,
    // <b>/<i>/<u>/<s>/<code>, <pre><code>) from the article's raw
    // markdown textContent. This way the saved file shows the rendered
    // document - not the editor's internal span-based representation
    // with raw markdown markers.
    const semantic = buildSemanticHTML(article)
    const html = '<!DOCTYPE html>\n' +
      '<html lang="en">\n<head>\n' +
      '<meta charset="utf-8">\n' +
      '<meta name="viewport" content="width=device-width, initial-scale=1">\n' +
      '<title>' + escapeHtml(document.title) + '</title>\n' +
      '<style>\n' + renderedDocStyles + '</style>\n' +
      '</head>\n<body>\n' +
      semantic.outerHTML +
      '\n</body>\n</html>\n'

    if ('showSaveFilePicker' in window) {
      try {
        const handle = await showSaveFilePicker({
          suggestedName: document.title + '.html',
          types: [{
            description: 'HTML file',
            accept: {'text/html': ['.html']},
          }],
        })
        const writable = await handle.createWritable()
        await writable.write(html)
        await writable.close()
        return
      } catch (e) {
        if (e.name === 'AbortError') return
      }
    }

    const blob = new Blob([html], {type: 'text/html'})
    const url = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.href = url
    a.download = document.title + '.html'
    a.click()
    URL.revokeObjectURL(url)
  }

  // CSS for the standalone HTML file produced by downloadHTML.
  // Mirrors the editor's visual style (font, padding, colors, dark
  // mode) but targets semantic tags (h1, ul, a, pre, ...) instead of
  // the editor's .md-* span classes.
  const renderedDocStyles = `
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      color-scheme: light dark;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      background-color: #fff;
      --link: #0066cc;
      --text: #161616;
      @media (prefers-color-scheme: dark) {
        background-color: #000;
        --link: #58a6ff;
        --text: #fff;
      }
    }
    body {
      color: var(--text);
      padding: 18px max(18px, calc(50vw - 400px));
      min-height: 100dvh;
      font: 18px / 1.5 system-ui;
      tab-size: 4;
      overflow-wrap: break-word;
    }
    a {
      color: var(--link);
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-thickness: 1px;
    }
    h1, h2, h3, h4, h5, h6 {
      font-weight: 700;
      margin-top: 1em;
      margin-bottom: 0.5em;
    }
    h1 { font-size: 2em; }
    h2 { font-size: 1.5em; }
    h3 { font-size: 1.25em; }
    h4 { font-size: 1.1em; }
    h5 { font-size: 1em; }
    h6 { font-size: 0.9em; }
    p { margin: 0.5em 0; }
    ul, ol {
      padding-left: 1.5em;
      margin: 0.5em 0;
    }
    li { margin: 0.25em 0; }
    li > ul, li > ol { margin: 0.25em 0; }
    code { font-family: monospace; }
    pre {
      font-family: monospace;
      padding: 12px;
      background: rgba(128, 128, 128, 0.1);
      border-radius: 6px;
      overflow-x: auto;
      margin: 0.5em 0;
    }
    pre code { padding: 0; background: none; }
    blockquote {
      border-left: 3px solid currentColor;
      padding-left: 1em;
      opacity: 0.7;
      margin: 0.5em 0;
    }
  `

  async function downloadTXT() {
    updateTitle()
    const text = article.textContent

    if ('showSaveFilePicker' in window) {
      try {
        const handle = await showSaveFilePicker({
          suggestedName: document.title + '.txt',
          types: [{
            description: 'TEXT file',
            accept: {'text/plain': ['.txt']},
          }],
        })
        const writable = await handle.createWritable()
        await writable.write(text)
        await writable.close()
        return
      } catch (e) {
        if (e.name === 'AbortError') return
      }
    }

    const blob = new Blob([text], {type: 'text/plain'})
    const url = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.href = url
    a.download = document.title + '.txt'
    a.click()
    URL.revokeObjectURL(url)
  }

  // Copy the rendered article to the clipboard as rich text so that,
  // when pasted into Gmail / Word / Google Docs / Slack, lists become
  // real <ul>/<ol> lists and links become real clickable <a> links
  // (instead of plain text with bullet glyphs and bracket URLs).
  //
  // The article is rendered by parseMarkdown() as a flat sequence of
  // <span class="md-..."> elements inside a pre-wrap container. We
  // rebuild it as semantic HTML before copying: listitem spans are
  // grouped into nested <ul>/<ol>, headings become <h1>..<h6>, inline
  // markers become <b>/<i>/<u>/<s>/<code>, and existing <a> links are
  // preserved verbatim.
  async function copyRendered() {
    const semantic = buildSemanticHTML(article)
    const html = '<div>' + semantic.innerHTML + '</div>'
    const text = article.textContent

    let ok = false
    if (navigator.clipboard && window.ClipboardItem) {
      try {
        const item = new ClipboardItem({
          'text/html': new Blob([html], {type: 'text/html'}),
          'text/plain': new Blob([text], {type: 'text/plain'}),
        })
        await navigator.clipboard.write([item])
        ok = true
      } catch (e) {
        // fall through to execCommand fallback
      }
    }

    if (!ok) {
      const ta = document.createElement('div')
      ta.contentEditable = 'true'
      ta.innerHTML = html
      ta.style.position = 'fixed'
      ta.style.top = '-9999px'
      ta.style.opacity = '0'
      document.body.appendChild(ta)
      const sel = window.getSelection()
      const range = document.createRange()
      range.selectNodeContents(ta)
      sel.removeAllRanges()
      sel.addRange(range)
      try { document.execCommand('copy') } catch (e) {}
      sel.removeAllRanges()
      document.body.removeChild(ta)
    }
  }

  // Build semantic HTML directly from the article's raw textContent,
  // so that when pasted into Gmail / Word / Google Docs / Slack, lists
  // become real <ul>/<ol>, links become real <a>, headings become
  // real <h1>..<h6>, and inline formatting (bold / italic / underline
  // / strike / code) is preserved - with all markdown markers stripped.
  //
  // We deliberately do NOT walk the rendered article DOM. parseMarkdown
  // leaves the raw markdown source as textContent of each span (so
  // '**bold**' is stored literally), and its multi-line list handling
  // only styles the first item of a list. Re-parsing from textContent
  // sidesteps both issues and keeps this function independent of any
  // future changes to the editor's renderer.
  function buildSemanticHTML(source) {
    const text = source.textContent || ''
    const root = document.createElement('div')
    const lines = text.split('\n')

    let i = 0
    let para = null

    function flushPara() {
      if (para && para.textContent.trim()) root.appendChild(para)
      para = null
    }

    function appendToPara(nodes) {
      if (!para) para = document.createElement('p')
      for (const n of nodes) para.appendChild(n)
    }

    // Parse a single line of inline markdown into an array of DOM
    // nodes (Text, <b>, <i>, <u>, <s>, <code>, <a>). Recurses for
    // nested formatting inside <b>/<i>/<u>/<s> (e.g. **bold _italic_**).
    function parseInline(s) {
      // Each matcher captures the inner content (markers stripped by
      // the wrapper). The 'tag' field is the semantic element to emit.
      // Order matters: underline before bold/italic (uses ++), bold
      // before italic (so ** wins over *), link before url (so [t](u)
      // wins over bare http://...).
      const matchers = [
        {re: /\+\+((?:(?!\+\+).)+?)\+\+/y, tag: 'u'},
        {re: /\*\*([^*\n]+?)\*\*/y, tag: 'b'},
        {re: /__([^_\n]+?)__/y, tag: 'b'},
        {re: /~~([^~\n]+?)~~/y, tag: 's'},
        {re: /\*([^*\n]+?)\*/y, tag: 'i'},
        {re: /_([^_\n]+?)_/y, tag: 'i'},
        {re: /`([^`\n]*)`/y, tag: 'code'},
      ]
      const linkRe = /\[([^\]\n]+)\]\((https?:\/\/[^\s<>()\[\]{}"'`]+)\)/y
      const urlRe = /https?:\/\/[^\s<>()\[\]{}"'`]+/y

      const nodes = []
      let i = 0
      while (i < s.length) {
        // Try link first (so [text](url) wins over bare url).
        linkRe.lastIndex = i
        const linkMatch = linkRe.exec(s)
        if (linkMatch && linkMatch.index === i) {
          const a = document.createElement('a')
          a.href = linkMatch[2]
          for (const n of parseInline(linkMatch[1])) a.appendChild(n)
          a.normalize()
          nodes.push(a)
          i += linkMatch[0].length
          continue
        }
        // Bare URL.
        urlRe.lastIndex = i
        const urlMatch = urlRe.exec(s)
        if (urlMatch && urlMatch.index === i) {
          const a = document.createElement('a')
          a.href = urlMatch[0]
          a.textContent = urlMatch[0]
          nodes.push(a)
          i += urlMatch[0].length
          continue
        }
        // Inline format markers.
        let matched = false
        for (const m of matchers) {
          m.re.lastIndex = i
          const res = m.re.exec(s)
          if (res && res.index === i) {
            const el = document.createElement(m.tag)
            // Recurse so e.g. **bold _italic_** produces <b>bold <i>italic</i></b>.
            for (const n of parseInline(res[1])) el.appendChild(n)
            el.normalize()
            nodes.push(el)
            i += res[0].length
            matched = true
            break
          }
        }
        if (matched) continue
        // Find next special char to retry from.
        const specials = '`~*_+[h'
        let next = s.length
        for (const ch of specials) {
          const idx = s.indexOf(ch, i)
          if (idx !== -1 && idx < next) next = idx
        }
        if (next === i) {
          nodes.push(document.createTextNode(s[i]))
          i++
        } else {
          nodes.push(document.createTextNode(s.slice(i, next)))
          i = next
        }
      }
      return nodes
    }

    // Collect a list (possibly nested) starting at line i. Returns
    // {list, nextI}. Indent level is derived from leading whitespace
    // (each 2 spaces = 1 level, tabs count as 2 spaces).
    function collectList(startLevel, ordered, startI) {
      const list = document.createElement(ordered ? 'ol' : 'ul')
      let j = startI
      while (j < lines.length) {
        const line = lines[j]
        const m = line.match(/^([ \t]{0,8})(-|\d+[.)])[ \t]+([^\n]*)$/)
        if (!m) break
        const indent = m[1].replace(/\t/g, '  ').length
        const level = Math.floor(indent / 2)
        const isOrdered = /^\d+[.)]$/.test(m[2])
        if (level < startLevel) break
        if (level === startLevel) {
          if (isOrdered !== ordered) break
          const li = document.createElement('li')
          for (const n of parseInline(m[3])) li.appendChild(n)
          list.appendChild(li)
          j++
          // Peek next line: if it's a deeper-level list item, recurse
          // and append the nested list to this <li>.
          if (j < lines.length) {
            const next = lines[j]
            const nm = next.match(/^([ \t]{0,8})(-|\d+[.)])[ \t]+([^\n]*)$/)
            if (nm) {
              const nIndent = nm[1].replace(/\t/g, '  ').length
              const nLevel = Math.floor(nIndent / 2)
              const nOrdered = /^\d+[.)]$/.test(nm[2])
              if (nLevel > startLevel) {
                const nested = collectList(nLevel, nOrdered, j)
                li.appendChild(nested.list)
                j = nested.nextI
              }
            }
          }
        } else if (level > startLevel) {
          // Deeper level encountered directly - shouldn't happen
          // because we handle nested via the peek above, but guard
          // against it just in case.
          break
        }
      }
      return {list, nextI: j}
    }

    while (i < lines.length) {
      const line = lines[i]

      // Code block: ``` or ~~~ fences.
      const fence = line.match(/^(```|~~~)(.*)$/)
      if (fence) {
        flushPara()
        const marker = fence[1]
        const code = []
        i++
        while (i < lines.length && lines[i] !== marker) {
          code.push(lines[i])
          i++
        }
        i++ // skip closing fence
        const pre = document.createElement('pre')
        const codeEl = document.createElement('code')
        codeEl.textContent = code.join('\n')
        pre.appendChild(codeEl)
        root.appendChild(pre)
        continue
      }

      // Heading: 1-6 # followed by space.
      const h = line.match(/^(#{1,6})[ \t]+(.*)$/)
      if (h) {
        flushPara()
        const level = h[1].length
        const el = document.createElement('h' + level)
        for (const n of parseInline(h[2])) el.appendChild(n)
        root.appendChild(el)
        i++
        continue
      }

      // List item.
      const li = line.match(/^([ \t]{0,8})(-|\d+[.)])[ \t]+([^\n]*)$/)
      if (li) {
        flushPara()
        const indent = li[1].replace(/\t/g, '  ').length
        const level = Math.floor(indent / 2)
        const ordered = /^\d+[.)]$/.test(li[2])
        const result = collectList(level, ordered, i)
        root.appendChild(result.list)
        i = result.nextI
        continue
      }

      // Empty line: paragraph break.
      if (!line.trim()) {
        flushPara()
        i++
        continue
      }

      // Regular text line.
      appendToPara(parseInline(line))
      i++
    }

    flushPara()
    root.normalize()
    return root
  }

  // Convert a bare URL into a markdown link with a smart title and
  // the full URL preserved as the href.
  //
  // Title extraction:
  //   1. Strip trailing slash, query (?...), and fragment (#...).
  //   2. Take the part after the last '/'.
  //   3. If there's no '/' (just a domain), use the domain with its
  //      TLD stripped (e.g. 'example.com' -> 'example').
  //   4. Decode percent-encoded chars (e.g. %20 -> space).
  //   5. Replace '+' and '_' with spaces.
  //   6. Collapse multiple spaces, trim.
  //
  // The URL inside (...) is kept intact so the rendered <a href> works.
  // The visible link text is the smart title, which is naturally short,
  // so the editor doesn't get dominated by long URLs.
  function urlToMarkdownLink(rawUrl) {
    let url = rawUrl.trim()
    // Strip trailing slash, query, fragment for title extraction.
    const stripped = url.replace(/[?#].*$/, '').replace(/\/$/, '')

    let title
    const schemeIdx = stripped.indexOf('://')
    const slashIdx = stripped.lastIndexOf('/')
    if (slashIdx === -1 || (schemeIdx >= 0 && slashIdx < schemeIdx + 3)) {
      // No path - use the domain. Strip 'www.' and the TLD.
      const host = stripped.replace(/^https?:\/\//, '').replace(/^www\./, '')
      const dotIdx = host.lastIndexOf('.')
      title = dotIdx > 0 ? host.slice(0, dotIdx) : host
    } else {
      title = stripped.slice(slashIdx + 1)
    }

    // Replace '+' with spaces FIRST (URL path convention), THEN decode
    // percent-encoding. This way '%2B' (encoded '+') survives the '+'
    // -> ' ' step and becomes a literal '+' after decoding.
    title = title.replace(/[+_]/g, ' ')
    try { title = decodeURIComponent(title) } catch (e) { /* keep raw */ }
    // Collapse whitespace and trim.
    title = title.replace(/\s+/g, ' ').trim()

    // If we ended up with no title (e.g. URL was just 'https://'),
    // fall back to the raw URL.
    if (!title) title = url

    return '[' + title + '](' + url + ')'
  }

  // Scan a string for bare URLs (http:// or https://) and replace
  // each with a markdown link via urlToMarkdownLink(). URLs that are
  // already inside markdown link syntax - [text](url) - are skipped
  // so we don't double-convert. URLs inside inline code (`...`) are
  // also skipped.
  function convertBareUrls(text) {
    const urlRe = /https?:\/\/[^\s<>()\[\]{}"'`]+/g
    let out = ''
    let last = 0
    let m
    while ((m = urlRe.exec(text)) !== null) {
      const url = m[0]
      const start = m.index
      // Look at what's immediately before the URL.
      // If we see '](' (markdown link syntax) or we're inside backticks,
      // skip this URL.
      const before = text.slice(0, start)
      const lastOpenBracket = before.lastIndexOf('[')
      const lastCloseBracket = before.lastIndexOf(']')
      const lastParen = before.lastIndexOf('(')
      // Inside markdown link if: there's a ']' after the last '[',
      // AND there's a '(' immediately after that ']' (i.e. we're
      // between '(' and the matching ')').
      const inMarkdownLink = lastCloseBracket > lastOpenBracket &&
                             lastParen === lastCloseBracket + 1
      // Check if we're inside backticks: count backticks before this
      // position; odd count = inside.
      const backtickCount = (before.match(/`/g) || []).length
      const inCode = backtickCount % 2 === 1

      if (inMarkdownLink || inCode) {
        out += text.slice(last, start + url.length)
        last = start + url.length
        continue
      }

      // Trim trailing punctuation that's unlikely part of the URL.
      // Common case: user copies URL followed by '.' or ','.
      let cleanUrl = url
      while (cleanUrl && /[.,;:!?)\]]$/.test(cleanUrl)) {
        cleanUrl = cleanUrl.slice(0, -1)
      }
      out += text.slice(last, start)
      out += urlToMarkdownLink(cleanUrl)
      last = start + cleanUrl.length
      // Advance regex lastIndex if we trimmed chars.
      if (cleanUrl.length < url.length) {
        urlRe.lastIndex = start + cleanUrl.length
      }
    }
    out += text.slice(last)
    return out
  }

  function parseMarkdown(element) {
    const input = element.textContent
    const frag = document.createDocumentFragment()

    const matchers = [
      // Underline (++text++) must be checked BEFORE the list matcher.
      // The content uses a "tempered greedy" pattern (?:(?!\+\+).)+?
      // so a single '+' is allowed inside the underlined text but the
      // match still stops at the first closing ++.
      {name: 'md-underline', re: /\+\+(?:(?!\+\+).)+?\+\+/y},
      // List markers: only '-' and numbered ("1." / "1)"). The user
      // does NOT want '+' or '*' to start a bullet, since '+' is used
      // for underline (++text++) and '*' for bold/italic.
      {name: 'md-listitem', re: /^([ \t]{0,8})(-|\d+[.)])([ \t]*)([^\n]*)\n?/my},
      {name: 'md-codeblock', re: /```[^\n]*\n[\s\S]*?\n```/y},
      {name: 'md-codeblock', re: /~~~[^\n]*\n[\s\S]*?\n~~~/y},
      {name: 'md-h1', re: /^#[ \t]+[^\n]*$/my},
      {name: 'md-h2', re: /^##[ \t]+[^\n]*$/my},
      {name: 'md-h3', re: /^###[ \t]+[^\n]*$/my},
      {name: 'md-h4', re: /^####[ \t]+[^\n]*$/my},
      {name: 'md-h5', re: /^#####[ \t]+[^\n]*$/my},
      {name: 'md-h6', re: /^######[ \t]+[^\n]*$/my},
      {name: 'md-code', re: /`[^`\n]*`/y},
      {name: 'md-bold', re: /\*\*[^*\n]+?\*\*/y},
      {name: 'md-bold', re: /__[^_\n]+?__/y},
      {name: 'md-strike', re: /~~[^~\n]+?~~/y},
      {name: 'md-italic', re: /\*[^*\n]+?\*/y},
      {name: 'md-italic', re: /_[^_\n]+?_/y},
      {name: 'md-url', re: /https?:\/\/[^\s<>()\[\]{}"'`]+/y},
      {name: 'md-link', re: /\[([^\]\n]+)\]\((https?:\/\/[^\s<>()\[\]{}"'`]+)\)/y},
    ]

    const specials = ['`', '~', '*', '#', '_', 'h', '+', '[', '-']

    let i = 0
    while (i < input.length) {
      let matched = false
      for (const m of matchers) {
        m.re.lastIndex = i
        const res = m.re.exec(input)
        if (res && res.index === i) {
          const raw = res[0]
          if (m.name === 'md-link') {
            // Keep [text](url) visible as markdown (so save() via
            // textContent persists it), but make the URL part clickable.
            const linkMatch = raw.match(/^(.+?)\((https?:\/\/[^)]+)\)$/)
            const span = document.createElement('span')
            span.className = 'md-link-source'
            if (linkMatch) {
              const [, label, url] = linkMatch
              span.appendChild(document.createTextNode(label + '('))
              const a = document.createElement('a')
              a.className = 'md-url'
              a.href = url
              a.textContent = url
              a.target = '_blank'
              a.rel = 'noopener noreferrer'
              span.appendChild(a)
              span.appendChild(document.createTextNode(')'))
            } else {
              span.textContent = raw
            }
            frag.appendChild(span)
          } else if (m.name === 'md-url') {
            const a = document.createElement('a')
            a.className = 'md-url'
            a.href = raw
            a.textContent = raw
            a.target = '_blank'
            a.rel = 'noopener noreferrer'
            frag.appendChild(a)
          } else if (m.name === 'md-listitem') {
            const [, indent, marker, spacing, content] = res
            const level = Math.floor((indent.replace(/\t/g, '  ').length || 0) / 2)
            const item = document.createElement('span')
            item.className = 'md-listitem'
            item.style.setProperty('--list-level', level)
            item.dataset.empty = String(!content.trim())

            const indentSpan = document.createElement('span')
            indentSpan.className = 'md-listindent'
            indentSpan.textContent = indent

            const markerSpan = document.createElement('span')
            markerSpan.className = 'md-listmarker'
            markerSpan.textContent = marker + spacing

            const contentSpan = document.createElement('span')
            contentSpan.className = 'md-listcontent'
            contentSpan.textContent = content

            item.append(indentSpan, markerSpan, contentSpan)
            frag.appendChild(item)
            // Hidden newline for raw-text preservation (element.textContent
            // needs \n between items so debounced re-render works).
            // Using a zero-height span so white-space: pre-wrap doesn't
            // render a visible line break between list items.
            const nl = document.createElement('span')
            nl.style.display = 'none'
            nl.textContent = '\n'
            frag.appendChild(nl)
          } else {
            const span = document.createElement('span')
            span.className = m.name
            span.textContent = raw
            frag.appendChild(span)
          }
          i += raw.length
          matched = true
          break
        }
      }

      if (matched) continue

      let next = input.length
      for (const ch of specials) {
        const idx = input.indexOf(ch, i)
        if (idx !== -1 && idx < next) next = idx
      }

      if (next === i) {
        frag.appendChild(document.createTextNode(input[i]))
        i++
        continue
      }

      frag.appendChild(document.createTextNode(input.slice(i, next)))
      i = next
    }

    article.textContent = ''
    article.appendChild(frag)
    article.normalize()
  }

  function initUI() {
    const menu = document.querySelector('#menu')
    const button = document.querySelector('#button')
    const newDocument = document.querySelector('#new-document')
    const deleteDocument = document.querySelector('#delete-document')
    const browseDocs = document.querySelector('#browse-docs')
    const saveAsHTML = document.querySelector('#save-as-html')
    const saveAsText = document.querySelector('#save-as-text')
    const copyRenderedBtn = document.querySelector('#copy-rendered')
    const linkFolderBtn = document.querySelector('#link-folder')
    const refreshFolderBtn = document.querySelector('#refresh-folder')

    button.addEventListener('click', event => {
      if (event.clientX || event.targetTouches) ripple(event)
      renderRecentDocs()
      renderDocSelector()
      menu.classList.toggle('visible')
    })

    function hideMenu() {
      menu.classList.remove('visible')
    }

    function notify(message) {
      const notification = document.querySelector('#notification')
      notification.classList.add('visible')
      notification.textContent = message
      setTimeout(() => notification.classList.remove('visible'), 2e3)
    }

    document.body.addEventListener('click', event => {
      let t = event.target
      if (t.closest('#menu')) return
      if (t.closest('#button')) return
      if (t.closest('#doc-dialog-overlay')) return
      if (t.closest('.ripple')) return
      menu.classList.remove('visible')
    })

    newDocument.addEventListener('click', event => {
      event.preventDefault()
      newDoc()
    })
    deleteDocument.addEventListener('click', event => {
      event.preventDefault()
      deleteDoc()
    })

    // Doc dialog
    browseDocs?.addEventListener('click', event => {
      event.preventDefault()
      hideMenu()
      renderDocDialogList()
      openDocDialog()
    })
    document.querySelector('#doc-dialog-close')?.addEventListener('click', closeDocDialog)
    document.querySelector('#doc-dialog-overlay')?.addEventListener('click', event => {
      if (event.target.id === 'doc-dialog-overlay') closeDocDialog()
    })
    document.querySelector('#doc-dialog-search')?.addEventListener('input', event => {
      renderDocDialogList(event.target.value)
    })
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') closeDocDialog()
    })
    saveAsHTML.addEventListener('click', event => {
      event.preventDefault()
      downloadHTML()
      hideMenu()
    })
    saveAsText.addEventListener('click', event => {
      event.preventDefault()
      downloadTXT()
      hideMenu()
    })
    copyRenderedBtn.addEventListener('click', async event => {
      event.preventDefault()
      await copyRendered()
      notify('Copied rendered content')
      hideMenu()
    })
    linkFolderBtn.addEventListener('click', async event => {
      event.preventDefault()
      if (linkedFolderHandle) {
        await unlinkFolder()
      } else {
        await linkFolder()
      }
      hideMenu()
    })
    refreshFolderBtn.addEventListener('click', async event => {
      event.preventDefault()
      if (!linkedFolderHandle) {
        notify('No folder linked. Use "Link folder…" first.')
      } else {
        await syncFromFolder(true)
      }
      hideMenu()
    })
  }

  function ripple(event) {
    const button = event.currentTarget
    const circle = document.createElement('span')
    const diameter = Math.max(button.clientWidth, button.clientHeight)
    const radius = diameter / 2
    circle.style.width = circle.style.height = `${diameter}px`
    circle.style.left = `${(event.clientX || event.targetTouches[0].pageX) - button.offsetLeft - radius}px`
    circle.style.top = `${(event.clientY || event.targetTouches[0].pageY) - button.offsetTop - radius}px`
    circle.classList.add('ripple')
    const ripple = button.getElementsByClassName('ripple')[0]
    if (ripple) ripple.remove()
    button.appendChild(circle)
  }

  // Convert clipboard HTML to the app's markdown syntax so that
  // formatting (underline, bold, italic, strike, code, headings,
  // lists, blockquotes, code blocks) is preserved on paste.
  //
  // Handles three flavours of clipboard HTML:
  //  1. Modern browsers / Google Docs: clean <ul>, <p>, <u>, <b>.
  //  2. Outlook desktop (Word engine): <p class=MsoListParagraph> with
  //     margin-left for indent and a Symbol-font '.' for the bullet.
  //  3. Outlook invalid nesting: <ul> directly inside <ul> (not inside
  //     <li>) - common when Word emits nested lists.
  // Also detects inline styles on <span> (text-decoration:underline,
  // font-weight:bold, etc.) which Word uses instead of <u>/<b>/<i>.
  function htmlToMarkdown(html) {
    const doc = new DOMParser().parseFromString(html, 'text/html')
    const body = doc.body
    const out = convertBlock(body)
    return out.replace(/\n{3,}/g, '\n\n').trim() + '\n'

    function convertBlock(node) {
      let s = ''
      for (const child of node.childNodes) s += convertNode(child, '')
      return s
    }

    function convertNode(node, indent) {
      if (node.nodeType === Node.TEXT_NODE) {
        // Collapse runs of whitespace but keep newlines.
        return node.textContent.replace(/\f/g, '\n').replace(/^[ \t]+|[ \t]+$/g, ' ').replace(/[ \t]+/g, ' ')
      }
      if (node.nodeType !== Node.ELEMENT_NODE) return ''

      const tag = node.tagName.toLowerCase()

      // ---- Block-level elements ---------------------------------
      if (tag === 'br') return '\n'
      if (tag === 'hr') return '\n---\n'

      // Outlook / Word list paragraphs: <p class=MsoListParagraph
      //   style="margin-left:0.5in">. Item</p>. Detect them BEFORE
      // generic <p> handling so the bullet char and indent are
      // converted to '- ' markers with proper nesting.
      if ((tag === 'p' || tag === 'div') && isOutlookListItem(node)) {
        return convertOutlookListItem(node)
      }

      if (tag === 'p' || tag === 'div') {
        const inner = convertInline(node)
        const trimmed = inner.replace(/^\s+|\s+$/g, '')
        return trimmed ? '\n' + trimmed + '\n' : '\n'
      }
      if (/^h[1-6]$/.test(tag)) {
        const level = Number(tag[1])
        const inner = convertInline(node).replace(/^\s+|\s+$/g, '')
        return inner ? '\n' + '#'.repeat(level) + ' ' + inner + '\n' : ''
      }
      if (tag === 'blockquote') {
        const inner = convertBlock(node).trim()
        if (!inner) return ''
        return '\n' + inner.split('\n').map(l => '> ' + l).join('\n') + '\n'
      }
      if (tag === 'pre') {
        const code = node.textContent.replace(/\n+$/, '')
        return '\n```\n' + code + '\n```\n'
      }
      if (tag === 'ul' || tag === 'ol') {
        return convertList(node, indent)
      }
      if (tag === 'li') {
        // Standalone <li> (rare) - render as unordered item.
        const inner = convertInline(node).replace(/^\s+|\s+$/g, '')
        return indent + '- ' + inner + '\n'
      }
      if (tag === 'table') {
        return convertTable(node, indent)
      }
      if (tag === 'tr' || tag === 'td' || tag === 'th') {
        // Outside of convertTable - just unwrap.
        return convertBlock(node)
      }

      // ---- Inline elements --------------------------------------
      return convertInline(node)
    }

    function convertInline(node) {
      const tag = node.tagName.toLowerCase()
      const inner = inlineChildren(node)
      const trimmed = inner.replace(/^\s+|\s+$/g, '')
      const leadSpace = inner.match(/^\s+/)
      const trailSpace = inner.match(/\s+$/)
      const ls = leadSpace ? leadSpace[0] : ''
      const ts = trailSpace ? trailSpace[0] : ''

      let wrapped
      switch (tag) {
        case 'b':
        case 'strong':
          wrapped = trimmed ? '**' + trimmed + '**' : ''
          break
        case 'i':
        case 'em':
          wrapped = trimmed ? '*' + trimmed + '*' : ''
          break
        case 'u':
        case 'ins':
          wrapped = trimmed ? '++' + trimmed + '++' : ''
          break
        case 's':
        case 'strike':
        case 'del':
          wrapped = trimmed ? '~~' + trimmed + '~~' : ''
          break
        case 'code':
          wrapped = trimmed ? '`' + trimmed + '`' : ''
          break
        case 'a': {
          const href = node.getAttribute('href') || ''
          if (href && href !== '#' && !isJavascriptUri(href)) {
            // If the link text and href differ, use standard [text](url) syntax.
            if (trimmed && trimmed !== href) {
              wrapped = '[' + trimmed + '](' + href + ')'
            } else if (trimmed) {
              wrapped = trimmed
            } else {
              wrapped = href
            }
          } else {
            wrapped = trimmed
          }
          break
        }
        case 'img': {
          const alt = node.getAttribute('alt') || ''
          const src = node.getAttribute('src') || ''
          wrapped = alt ? alt + ' (' + src + ')' : src
          break
        }
        case 'span':
        case 'font':
        case 'sub':
        case 'sup':
        case 'small':
        case 'mark':
        case 'abbr':
        case 'cite':
        case 'q':
        case 'time':
        case 'label':
        case 'wbr':
          // Generic styling containers - but if a Word/Outlook inline
          // style is set (text-decoration:underline, font-weight:bold,
          // etc.) honour it instead of just unwrapping.
          wrapped = applyInlineStyle(node, trimmed)
          break
        default:
          wrapped = inner
      }
      return ls + wrapped + ts
    }

    // Apply Word/Outlook inline-style decorations to the already-
    // converted inner text. Each detected property adds its markdown
    // delimiter around the trimmed content. Multiple properties can
    // stack (e.g. bold + underline -> **++text++**).
    function applyInlineStyle(node, text) {
      if (!text) return ''
      const style = (node.getAttribute('style') || '').toLowerCase()
      let result = text
      const decoration = (style.match(/text-decoration\s*:\s*([^;]+)/) || [])[1] || ''
      const fontWeight  = (style.match(/font-weight\s*:\s*([^;]+)/)  || [])[1] || ''
      const fontStyle   = (style.match(/font-style\s*:\s*([^;]+)/)   || [])[1] || ''
      if (/\bunderline\b/.test(decoration))      result = '++' + result + '++'
      if (/\bline-through\b/.test(decoration))   result = '~~' + result + '~~'
      if (/^(bold|bolder|[6-9]00)$/.test(fontWeight.trim())) result = '**' + result + '**'
