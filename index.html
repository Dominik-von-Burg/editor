      if (/^(italic|oblique)$/.test(fontStyle.trim()))       result = '*' + result + '*'
      return result
    }

    // Recursively convert children of an inline context. Block children
    // (p, div, ul, etc.) encountered inside an inline context are
    // rendered with surrounding newlines so they break the line.
    function inlineChildren(node) {
      let s = ''
      for (const child of node.childNodes) {
        if (child.nodeType === Node.TEXT_NODE) {
          s += child.textContent.replace(/\f/g, '\n').replace(/[ \t]+/g, ' ')
        } else if (child.nodeType === Node.ELEMENT_NODE) {
          const tag = child.tagName.toLowerCase()
          if (tag === 'br') {
            s += '\n'
          } else if (
            tag === 'p' || tag === 'div' || tag === 'ul' || tag === 'ol' ||
            tag === 'blockquote' || tag === 'pre' || tag === 'hr' ||
            tag === 'table' || /^h[1-6]$/.test(tag)
          ) {
            s += '\n' + convertNode(child, '') + '\n'
          } else {
            s += convertInline(child)
          }
        }
      }
      return s
    }

    function convertList(listNode, indent) {
      const isOrdered = listNode.tagName.toLowerCase() === 'ol'
      let s = '\n'
      let i = 1
      for (const child of listNode.children) {
        const tag = child.tagName.toLowerCase()
        if (tag === 'li') {
          // Pull out nested lists so they can be rendered as indented items.
          const nestedLists = []
          const clone = child.cloneNode(true)
          const nested = clone.querySelectorAll('ul, ol')
          for (const n of nested) {
            nestedLists.push(n.cloneNode(true))
            n.remove()
          }
          const content = inlineChildren(clone).replace(/^\s+|\s+$/g, '').replace(/\n+/g, ' ')
          const marker = isOrdered ? i + '.' : '-'
          s += indent + marker + ' ' + content + '\n'
          for (const nestedList of nestedLists) {
            s += convertList(nestedList, indent + '  ')
          }
          i++
        } else if (tag === 'ul' || tag === 'ol') {
          // Outlook / Word invalid nesting: a <ul> directly inside a
          // <ul> (not wrapped in <li>). Recurse with deeper indent so
          // sub-bullets are preserved instead of being dropped.
          s += convertList(child, indent + '  ')
        }
        // else: ignore unknown children (whitespace text nodes are
        // already filtered by .children).
      }
      return s
    }

    // ---- Outlook / Word list paragraph support -------------------
    // Word emits bullets as <p class=MsoListParagraph style="margin-left:Xin">
    // with a Symbol-font '.' (or 'o', etc.) as the bullet glyph.
    // There is no <ul>/<li> at all - the list structure is encoded in
    // the class + margin-left. We reconstruct '- item' lines with the
    // indent level derived from margin-left (each 0.5in = 1 level,
    // first level at 0.5in = indent 0).
    function isOutlookListItem(p) {
      const cls = (p.getAttribute('class') || '').toLowerCase()
      if (/\bmsolistparagraph\b/.test(cls)) return true
      // Also catch paragraphs that just start with a bullet glyph,
      // even without the class - common when copying rendered email.
      const text = (p.textContent || '').replace(/^\s+/, '')
      if (/^[·•◦▪○●‣⁃▪]\s+/.test(text)) return true
      return false
    }

    function outlookListLevel(p) {
      const style = p.getAttribute('style') || ''
      const m = style.match(/margin-left\s*:\s*([0-9.]+)\s*(pt|in|px|cm)/i)
      if (!m) return 0
      const val = parseFloat(m[1])
      const unit = m[2].toLowerCase()
      let inches
      if (unit === 'pt') inches = val / 72
      else if (unit === 'in') inches = val
      else if (unit === 'px') inches = val / 96
      else if (unit === 'cm') inches = val / 2.54
      else inches = 0
      // Each 0.5in of margin = one indent level. Round to nearest int,
      // clamp to >= 0. Subtract 1 because the first level (0.5in)
      // should be indent 0 (top-level bullet).
      const level = Math.round(inches / 0.5) - 1
      return Math.max(0, level)
    }

    function outlookListItemMarker(p) {
      const text = (p.textContent || '').replace(/^\s+/, '')
      // Numbered Word list? ('1.' / '1)')
      const num = text.match(/^(\d+)([.)])/)
      if (num) return num[1] + num[2]
      return '-'
    }

    function outlookListItemText(p) {
      // Strip the leading bullet glyph and any whitespace that follows
      // it. Also strip a leading numbered prefix (which becomes the
      // marker via outlookListItemMarker).
      let text = inlineChildren(p).replace(/^\s+|\s+$/g, '')
      // Remove leading bullet glyph + following whitespace.
      text = text.replace(/^[·•◦▪○●‣⁃▪]\s*/, '')
      // Remove leading '1.' / '1)' if present.
      text = text.replace(/^\d+[.)]\s+/, '')
      // Collapse internal whitespace runs to single spaces.
      text = text.replace(/\s+/g, ' ').replace(/^\s+|\s+$/g, '')
      return text
    }

    function convertOutlookListItem(p) {
      const level = outlookListLevel(p)
      const marker = outlookListItemMarker(p)
      const text = outlookListItemText(p)
      const indent = '  '.repeat(level)
      // No leading \n — Outlook items are siblings in a flat <div>,
      // so adding \n before each would create blank lines between
      // items and break the list regex (which needs consecutive lines).
      return indent + marker + ' ' + text + '\n'
    }

    function convertTable(tableNode, indent) {
      // Render as tab-separated rows. This loses column alignment but
      // preserves the data in a paste-friendly form.
      const rows = tableNode.querySelectorAll('tr')
      if (!rows.length) return ''
      let s = '\n'
      rows.forEach(row => {
        const cells = row.querySelectorAll('td, th')
        const texts = []
        cells.forEach(cell => {
          texts.push(inlineChildren(cell).replace(/\s+/g, ' ').replace(/^\s+|\s+$/g, ''))
        })
        s += indent + texts.join('\t') + '\n'
      })
      return s
    }

    function isJavascriptUri(s) {
      return /^javascript:/i.test(s)
    }
  }

  function Editor(element, highlight) {
    const listeners = []
    const history = []
    let at = -1, prev
    let pendingOffset = null // character offset captured before DOM change
    let skipNextInput = false // prevent input handler during programmatic DOM changes
    let skipNextKeyup = false // prevent keyup handler after list actions

    const debounceHighlight = debounce(30, () => {
      const offset = pendingOffset !== null ? pendingOffset : saveOffset()
      pendingOffset = null
      // Strip any native <ul>/<ol>/<li> the browser may have auto-created
      // (some browsers ignore plaintext-only and format lists natively).
      stripNativeLists(element)
      highlight(element)
      restoreOffset(offset)
    })

    function stripNativeLists(el) {
      for (const list of el.querySelectorAll('ul, ol')) {
        const raw = []
        const isOrdered = list.tagName === 'OL'
        for (let i = 0; i < list.children.length; i++) {
          const li = list.children[i]
          const prefix = isOrdered ? `${i + 1}. ` : '- '
          raw.push(prefix + (li.textContent || ''))
        }
        const tn = document.createTextNode(raw.join('\n'))
        list.replaceWith(tn)
      }
      el.normalize()
    }

    const shouldRecord = (event) => {
      return !isUndo(event) && !isRedo(event)
        && event.key !== 'Meta'
        && event.key !== 'Control'
        && event.key !== 'Alt'
        && !event.key.startsWith('Arrow')
    }

    let recording = false
    const debounceRecordHistory = debounce(300, (event) => {
      if (shouldRecord(event)) {
        recordHistory()
        recording = false
      }
    })

    const on = (type, fn) => {
      listeners.push([type, fn])
      element.addEventListener(type, fn)
    }
    on('keydown', event => {
      if (event.defaultPrevented) return
      prev = toString()

      if (event.key === 'Tab') {
        preventDefault(event)
        pendingOffset = null // don't let pending offset interfere
        indentSelection(event.shiftKey)
        return
      }

      if (event.key === 'Enter') {
        pendingOffset = null // don't let pending offset interfere

        // Shift+Enter: insert a blank line (break out of list if inside one)
        if (event.shiftKey) {
          const sel = getSelection()
          const anchor = sel?.anchorNode
          const listItem = (anchor?.nodeType === 1)
            ? anchor.closest('.md-listitem')
            : (anchor?.parentElement && anchor.parentElement.closest('.md-listitem'))
          if (listItem) {
            preventDefault(event)
            // Insert a newline before the list item
            const nl = document.createTextNode('\n')
            listItem.parentNode.insertBefore(nl, listItem)
            // Move cursor to the new newline
            const range = document.createRange()
            range.setStart(nl, 1)
            range.collapse(true)
            sel.removeAllRanges()
            sel.addRange(range)
            debounceHighlight()
            return
          }
          return // let browser handle Shift+Enter outside lists
        }

        const action = nextListAction()
        if (action?.exit) {
          preventDefault(event)
          exitList()
          return
        }
        if (action?.prefix) {
          preventDefault(event)
          insertListPrefix(action.prefix)
          return
        }
      }

      if (isUndo(event)) doUndo(event)
      if (isRedo(event)) doRedo(event)
      if (shouldRecord(event) && !recording) {
        recordHistory()
        recording = true
      }
      // Capture cursor offset now, before the character is inserted.
      // The debounce highlight will use this to restore position after re-render.
      if (event.key.length === 1 && !event.ctrlKey && !event.metaKey && !event.altKey) {
        pendingOffset = saveOffset()
      }
    })
    on('keyup', event => {
      if (event.defaultPrevented) return
      if (event.isComposing) return
      if (skipNextKeyup) { skipNextKeyup = false; return }
      if (prev !== toString()) debounceHighlight()
      debounceRecordHistory(event)
    })
    on('paste', event => {
      // Intercept paste so we can convert clipboard HTML (from Word,
      // Google Docs, Outlook, etc.) into the app's markdown syntax.
      // This keeps underlines, sub-bullets, bold, italic, strike,
      // headings, and code blocks when pasting from rich-text sources.
      const cd = event.clipboardData
      if (cd) {
        const htmlData = cd.getData('text/html')
        const textData = cd.getData('text/plain')
        let insert = textData
        if (htmlData && htmlData.trim()) {
          try {
            const converted = htmlToMarkdown(htmlData)
            // Trim leading/trailing newlines so a single pasted word
            // (e.g. an underlined span from Outlook) doesn't break the
            // current line. Internal paragraph breaks are preserved.
            const stripped = converted.replace(/^\n+|\n+$/g, '')
            if (stripped.trim()) insert = stripped
          } catch (e) {
            // fall back to plain text on any conversion error
            insert = textData
          }
        }
        // Convert any bare URLs (in the plain-text insertion) into
        // markdown links with smart titles. We only do this for plain-
        // text pastes (i.e. when we didn't go through htmlToMarkdown)
        // - because htmlToMarkdown already preserves links from rich
        // sources and we don't want to double-convert them.
        //
        // Skip lines that already contain markdown link syntax, so we
        // don't touch [text](url) patterns that came in via the
        // clipboard or were already typed by the user.
        if (insert === textData) {
          insert = convertBareUrls(insert)
        }
        event.preventDefault()
        insertText(insert)
        debounceHighlight()
        setTimeout(recordHistory, 10)
        return
      }
      setTimeout(recordHistory, 10)
    })
    on('cut', () => setTimeout(recordHistory, 10))
    on('beforeinput', event => {
      if (event.inputType === 'historyUndo') doUndo(event)
      if (event.inputType === 'historyRedo') doRedo(event)
      // Trigger re-render after text input. This catches cases where
      // keyup doesn't fire (e.g. IME, paste, or automation tools)
      // and ensures markdown is parsed after every text change.
      if (event.inputType === 'insertText' ||
          event.inputType === 'insertParagraph' ||
          event.inputType === 'insertLineBreak' ||
          event.inputType === 'insertOrderedList' ||
          event.inputType === 'insertUnorderedList') {
        // Prevent browser auto-formatting of lists. We handle list
        // rendering ourselves via parseMarkdown, and the browser's
        // auto-formatting would create <ul>/<ol> that break our span-based DOM.
        if (event.inputType === 'insertOrderedList' ||
            event.inputType === 'insertUnorderedList') {
          event.preventDefault()
          return
        }
        // Capture cursor offset before text is inserted, then add
        // the length of inserted text so restore places cursor after it.
        const insertedLen = (event.data || '').length || 1
        pendingOffset = saveOffset() + insertedLen
        debounceHighlight()
      }
    })
    // Safety net: the input event fires after text changes, ensuring
    // re-render even if beforeinput/keyup are missed (e.g. IME, assistive tech).
    on('input', event => {
      if (skipNextInput) { skipNextInput = false; return }
      if (prev !== toString()) debounceHighlight()
    })

    function nextListAction() {
      const pos = save()
      // Walk the DOM to find the list item containing the cursor.
      // This is more robust than parsing textContent, which loses
      // newlines and transforms '-' into '•' after parseMarkdown.
      const sel = getSelection()
      if (!sel || !sel.rangeCount) return null
      const anchor = sel.anchorNode
      const listItem = (anchor.nodeType === 1)
        ? anchor.closest('.md-listitem')
        : (anchor.parentElement && anchor.parentElement.closest('.md-listitem'))
      if (!listItem) return null

      const markerSpan = listItem.querySelector('.md-listmarker')
      const contentSpan = listItem.querySelector('.md-listcontent')
      const indentSpan = listItem.querySelector('.md-listindent')
      if (!markerSpan || !contentSpan) return null

      const marker = markerSpan.textContent
      const content = contentSpan.textContent || ''
      const indent = indentSpan ? indentSpan.textContent : ''

      // Unordered list: marker is '-' or '•' (may include trailing space)
      const markerTrim = marker.trim()
      if (markerTrim === '-' || markerTrim === '•') {
        if (!content.trim()) return {exit: true}
        return {prefix: `${indent}- `}
      }

      // Ordered list: marker is '1.', '2)', etc. (may include trailing space)
      const orderedMatch = markerTrim.match(/^(\d+)([.)])$/)
      if (orderedMatch) {
        if (!content.trim()) return {exit: true}
        const num = Number(orderedMatch[1]) + 1
        const sep = orderedMatch[2]
        return {prefix: `${indent}${num}${sep} `}
      }

      return null
    }

    function exitList() {
      skipNextInput = true
      const sel = getSelection()
      if (!sel || !sel.rangeCount) return
      const anchor = sel.anchorNode
      const listItem = (anchor.nodeType === 1)
        ? anchor.closest('.md-listitem')
        : (anchor.parentElement && anchor.parentElement.closest('.md-listitem'))
      if (!listItem) return

      // Remove the empty list item and place cursor after the previous item.
      // If there's no previous item, insert a text node before this item.
      const prevItem = listItem.previousElementSibling
      if (prevItem) {
        listItem.remove()
        // Place cursor at end of previous item's content
        const prevContent = prevItem.querySelector('.md-listcontent')
        if (prevContent) {
          const newRange = document.createRange()
          if (prevContent.firstChild) {
            newRange.setStart(prevContent.firstChild, prevContent.firstChild.textContent.length)
          } else {
            newRange.setStart(prevContent, 0)
          }
          newRange.collapse(true)
          sel.removeAllRanges()
          sel.addRange(newRange)
        }
      } else {
        // No previous item - replace with a text node containing a newline
        const textNode = document.createTextNode('\n')
        element.insertBefore(textNode, listItem)
        listItem.remove()

        const newRange = document.createRange()
        newRange.setStart(textNode, 1)
        newRange.collapse(true)
        sel.removeAllRanges()
        sel.addRange(newRange)
      }
      // Cancel pending debounce to prevent visual cursor jump.
      // exitList already modified the DOM; a stale debounce would
      // re-render and briefly move the cursor.
      debounceHighlight.cancel()
      skipNextKeyup = true
    }

    function insertListPrefix(prefix) {
      skipNextInput = true
      const sel = getSelection()
      if (!sel || !sel.rangeCount) return
      const anchor = sel.anchorNode
      const listItem = (anchor.nodeType === 1)
        ? anchor.closest('.md-listitem')
        : (anchor.parentElement && anchor.parentElement.closest('.md-listitem'))
      if (!listItem) return

      const contentSpan = listItem.querySelector('.md-listcontent')
      const markerSpan = listItem.querySelector('.md-listmarker')
      const fullContent = contentSpan ? (contentSpan.textContent || '') : ''
      const marker = markerSpan ? markerSpan.textContent : ''

      // Calculate cursor offset within content span.
      let cursorOffset = fullContent.length // default: end of content
      if (contentSpan) {
        const range = sel.getRangeAt(0)
        const preRange = document.createRange()
        preRange.selectNodeContents(contentSpan)
        preRange.setEnd(range.startContainer, range.startOffset)
        cursorOffset = preRange.toString().length
      }

      // Build raw text: text before listItem, then split the content
      // at cursor position — first part stays, second part goes to new item.
      const contentBefore = fullContent.slice(0, cursorOffset)
      const contentAfter = fullContent.slice(cursorOffset)

      const r = document.createRange()
      r.setStart(element, 0)
      r.setEndBefore(listItem)
      const textBefore = r.toString()

      r.setStartAfter(listItem)
      r.setEndAfter(element.lastChild)
      const textAfter = r.toString()

      const newRaw = textBefore + marker + contentBefore + '\n' + prefix + contentAfter + textAfter
      element.textContent = newRaw
      highlight(element)

      // Place cursor after the prefix in the new list item.
      // For split: cursor at start of contentAfter. For continue: cursor at end of (empty) content.
      const newItems = element.querySelectorAll('.md-listitem')
      const newItem = newItems[newItems.length - 1]
      if (newItem) {
        const newContent = newItem.querySelector('.md-listcontent')
        if (newContent) {
          // Ensure there's a text node to place cursor on.
          // When continuing (empty content), highlight() creates no text node.
          if (!newContent.firstChild) {
            newContent.appendChild(document.createTextNode(''))
          }
          const newRange = document.createRange()
          newRange.setStart(newContent.firstChild, 0)
          newRange.collapse(true)
          sel.removeAllRanges()
          sel.addRange(newRange)
          // Save offset NOW so debounceHighlight restores here.
          pendingOffset = saveOffset()
        }
      }
      debounceHighlight.cancel()
      skipNextKeyup = true // prevent keyup from scheduling another debounce
    }

    function insertText(text) {
      const s = getSelection()
      if (!s || !s.rangeCount) {
        element.textContent = (element.textContent || '') + text
        element.normalize()
        return
      }

      const range = s.getRangeAt(0)
      range.deleteContents()
      const node = document.createTextNode(text)
      range.insertNode(node)
      range.setStartAfter(node)
      range.collapse(true)
      s.removeAllRanges()
      s.addRange(range)
      element.normalize()
    }

    function indentSelection(outdent) {
      skipNextInput = true
      const pos = save()
      const text = toString()
      const start = Math.min(pos.start, pos.end)
      const end = Math.max(pos.start, pos.end)
      const blockStart = text.lastIndexOf('\n', Math.max(0, start - 1)) + 1
      let blockEnd = text.indexOf('\n', end)
      if (blockEnd === -1) blockEnd = text.length
      else blockEnd += 1

      const block = text.slice(blockStart, blockEnd)
      const lines = block.split('\n')
      const transforms = []
      let transformed = ''

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i]
        const nextLine = outdent
          ? line.replace(/^\t/, '').replace(/^ {1,2}/, '')
          : `  ${line}`
        transforms.push(nextLine.length - line.length)
        transformed += nextLine
        if (i < lines.length - 1) transformed += '\n'
      }

      const totalDelta = transforms.reduce((sum, delta) => sum + delta, 0)
      const mapPos = value => {
        if (value < blockStart) return value
        if (value > blockEnd) return value + totalDelta

        let shift = 0
        let lineStart = blockStart
        for (let i = 0; i < lines.length; i++) {
          if (value >= lineStart) shift += transforms[i]
          lineStart += lines[i].length + 1
        }
        return value + shift
      }

      element.textContent = text.slice(0, blockStart) + transformed + text.slice(blockEnd)
      highlight(element)
      restore({start: mapPos(pos.start), end: mapPos(pos.end), dir: pos.dir})
      debounceHighlight.cancel()
      skipNextKeyup = true
    }

    function save() {
      const s = getSelection()
      const pos = {start: 0, end: 0, dir: undefined}
      let {anchorNode, anchorOffset, focusNode, focusOffset} = s
      if (!anchorNode || !focusNode) return pos
      if (anchorNode === element && focusNode === element) {
        pos.start = (anchorOffset > 0 && element.textContent) ? element.textContent.length : 0
        pos.end = (focusOffset > 0 && element.textContent) ? element.textContent.length : 0
        pos.dir = (focusOffset >= anchorOffset) ? '->' : '<-'
        return pos
      }
      if (anchorNode.nodeType === Node.ELEMENT_NODE) {
        const node = document.createTextNode('')
        anchorNode.insertBefore(node, anchorNode.childNodes[anchorOffset])
        anchorNode = node
        anchorOffset = 0
      }
      if (focusNode.nodeType === Node.ELEMENT_NODE) {
        const node = document.createTextNode('')
        focusNode.insertBefore(node, focusNode.childNodes[focusOffset])
        focusNode = node
        focusOffset = 0
      }
      visit(element, el => {
        if (el === anchorNode && el === focusNode) {
          pos.start += anchorOffset
          pos.end += focusOffset
          pos.dir = anchorOffset <= focusOffset ? '->' : '<-'
          return 'stop'
        }
        if (el === anchorNode) {
          pos.start += anchorOffset
          if (!pos.dir) {
            pos.dir = '->'
          } else {
            return 'stop'
          }
        } else if (el === focusNode) {
          pos.end += focusOffset
          if (!pos.dir) {
            pos.dir = '<-'
          } else {
            return 'stop'
          }
        }
        if (el.nodeType === Node.TEXT_NODE) {
          if (pos.dir !== '->') pos.start += el.nodeValue.length
          if (pos.dir !== '<-') pos.end += el.nodeValue.length
        }
      })

      element.normalize()
      return pos
    }

    function restore(pos) {
      const s = getSelection()
      let startNode, startOffset = 0
      let endNode, endOffset = 0

      if (!pos.dir) pos.dir = '->'
      if (pos.start < 0) pos.start = 0
      if (pos.end < 0) pos.end = 0

      if (pos.dir === '<-') {
        const {start, end} = pos
        pos.start = end
        pos.end = start
      }

      let current = 0

      visit(element, el => {
        if (el.nodeType !== Node.TEXT_NODE) return

        const len = (el.nodeValue || '').length
        if (current + len > pos.start) {
          if (!startNode) {
            startNode = el
            startOffset = pos.start - current
          }
          if (current + len > pos.end) {
            endNode = el
            endOffset = pos.end - current
            return 'stop'
          }
        }
        current += len
      })

      if (!startNode) {
        startNode = element
        startOffset = element.childNodes.length
      }
      if (!endNode) {
        endNode = element
        endOffset = element.childNodes.length
      }

      if (pos.dir === '<-') {
        [startNode, startOffset, endNode, endOffset] = [endNode, endOffset, startNode, startOffset]
      }

      {
        const startEl = uneditable(startNode)
        if (startEl) {
          const node = document.createTextNode('')
          startEl.parentNode?.insertBefore(node, startEl)
          startNode = node
          startOffset = 0
        }
        const endEl = uneditable(endNode)
        if (endEl) {
          const node = document.createTextNode('')
          endEl.parentNode?.insertBefore(node, endEl)
          endNode = node
          endOffset = 0
        }
      }

      s.setBaseAndExtent(startNode, startOffset, endNode, endOffset)
      element.normalize()
    }

    function uneditable(node) {
      while (node && node !== element) {
        if (node.nodeType === Node.ELEMENT_NODE) {
          if (node.getAttribute('contenteditable') === 'false') {
            return node
          }
        }
        node = node.parentNode
      }
    }

    // Lightweight offset-based save/restore for debounce highlight.
    // Unlike save()/restore() which capture DOM node references that go
    // stale after re-render, these just use a flat character offset.
    function saveOffset() {
      const s = getSelection()
      if (!s || !s.rangeCount) return 0
      const range = document.createRange()
      range.setStart(element, 0)
      range.setEnd(s.anchorNode, s.anchorOffset)
      return range.toString().length
    }

    function restoreOffset(offset) {
      const s = getSelection()
      if (!s) return
      let current = 0
      let found = false
      const visit = (parent) => {
        for (const child of parent.childNodes) {
          if (child.nodeType === Node.TEXT_NODE) {
            const len = child.textContent.length
            if (current < offset && current + len >= offset) {
              const r = document.createRange()
              r.setStart(child, offset - current)
              r.collapse(true)
              s.removeAllRanges()
              s.addRange(r)
              found = true
              return 'stop'
            }
            current += len
          } else if (child.nodeType === Node.ELEMENT_NODE) {
            const result = visit(child)
            if (result === 'stop') return 'stop'
          }
        }
      }
      visit(element)
      // Fallback: place cursor at end of last visible text node
      if (!found) {
        let lastText = null
        const findLast = (parent) => {
          for (const child of parent.childNodes) {
            if (child.nodeType === Node.TEXT_NODE && child.textContent.trim()) {
              lastText = child
            } else if (child.nodeType === Node.ELEMENT_NODE) {
              findLast(child)
            }
          }
        }
        findLast(element)
        if (lastText) {
          const r = document.createRange()
          r.setStart(lastText, lastText.textContent.length)
          r.collapse(true)
          s.removeAllRanges()
          s.addRange(r)
        }
      }
    }

    function doUndo(event) {
      preventDefault(event)
      at--
      const record = history[at]
      if (record) {
        element.innerHTML = record.html
        restore(record.pos)
      }
      if (at < 0) at = 0
    }

    function doRedo(event) {
      preventDefault(event)
      at++
      const record = history[at]
      if (record) {
        element.innerHTML = record.html
        restore(record.pos)
      }
      if (at >= history.length) at--
    }

    function recordHistory() {
      const html = element.innerHTML
      const pos = save()
      const lastRecord = history[at]
      if (
        lastRecord
        && lastRecord.html === html
        && lastRecord.pos.start === pos.start
        && lastRecord.pos.end === pos.end
      ) return
      at++
      history[at] = {html, pos}
      history.splice(at + 1)
      const maxHistory = 10_000
      if (at > maxHistory) {
        at = maxHistory
        history.splice(0, 1)
      }
      // Cap total history size at 10 MB to prevent memory exhaustion.
      // Use string length as approximation (1 char ≈ 1-4 bytes UTF-8).
      const maxBytes = 10 * 1024 * 1024
      let totalBytes = 0
      for (let i = 0; i < history.length; i++) {
        totalBytes += history[i].html.length
        if (totalBytes > maxBytes) {
          history.splice(0, i + 1)
          at -= i + 1
          if (at < 0) at = 0
          break
        }
      }
    }

    function visit(editor, visitor) {
      const queue = []
      if (editor.firstChild) queue.push(editor.firstChild)
      let el = queue.pop()
      while (el) {
        if (visitor(el) === 'stop') break
        if (el.nextSibling) queue.push(el.nextSibling)
        if (el.firstChild) queue.push(el.firstChild)
        el = queue.pop()
      }
    }

    function isCtrl(event) {
      return event.metaKey || event.ctrlKey
    }

    function isUndo(event) {
      return isCtrl(event) && !event.shiftKey && event.code === 'KeyZ'
    }

    function isRedo(event) {
      return isCtrl(event) && event.shiftKey && event.code === 'KeyZ'
    }

    function toString() {
      return element.textContent || ''
    }

    function preventDefault(event) {
      event.preventDefault()
    }

    function getSelection() {
      return element.getRootNode().getSelection()
    }

    return {
      set(content) {
        element.textContent = content
        highlight(element)
      },
      destroy() {
        for (const [type, fn] of listeners) editor.removeEventListener(type, fn)
      },
    }
  }
